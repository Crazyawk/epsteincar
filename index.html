<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open City Pursuit</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="loading">Loading city...</div>
  <div id="hud">
    <div class="title">Open City Pursuit</div>
    <div>W / ↑ drive</div>
    <div>S / ↓ brake / reverse</div>
    <div>A / D steer</div>
    <div>Space handbrake</div>
    <div>C camera</div>
    <div>R reset</div>
    <div class="stats">
      <div>Speed <span id="speed">0</span></div>
      <div>Wanted <span id="wanted">0</span></div>
      <div>Police hits <span id="hits">0</span>/20</div>
      <div>Light <span id="light">-</span></div>
      <div>Traffic <span id="traffic">0</span></div>
      <div>Police <span id="police">0</span></div>
    </div>
  </div>
  <canvas id="minimap" width="140" height="140"></canvas>
  <div id="message"></div>
  <div id="flash"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
