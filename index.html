<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Car Racing Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #87ceeb;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: white;
      background: rgba(0,0,0,0.35);
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
      backdrop-filter: blur(4px);
    }
    #centerMsg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 32px;
      font-weight: bold;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
      z-index: 12;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      background: linear-gradient(#6ec6ff, #3b7dd8);
      font-size: 24px;
      z-index: 20;
    }
  </style>
</head>
<body>
  <div id="loading">Loading 3D Car Game...</div>
  <div id="hud">
    <div><b>3D Car Racing Game</b></div>
    <div>W / ↑ = Drive</div>
    <div>S / ↓ = Brake / Reverse</div>
    <div>A / D = Steer</div>
    <div>Space = Handbrake</div>
    <div>R = Reset</div>
    <hr style="border-color: rgba(255,255,255,0.25);">
    <div>Speed: <span id="speed">0</span></div>
    <div>Lap: <span id="lap">1</span></div>
    <div>Boosts: <span id="boosts">0</span></div>
  </div>
  <div id="centerMsg">BOOST!</div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const loading = document.getElementById("loading");
    const speedEl = document.getElementById("speed");
    const lapEl = document.getElementById("lap");
    const boostsEl = document.getElementById("boosts");
    const centerMsg = document.getElementById("centerMsg");

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x87ceeb, 80, 320);

    const camera = new THREE.PerspectiveCamera(
      70,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Lights
    const hemi = new THREE.HemisphereLight(0xffffff, 0x5a7d3a, 1.1);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xffffff, 1.25);
    sun.position.set(50, 80, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -140;
    sun.shadow.camera.right = 140;
    sun.shadow.camera.top = 140;
    sun.shadow.camera.bottom = -140;
    scene.add(sun);

    // Ground
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(1200, 1200),
      new THREE.MeshStandardMaterial({ color: 0x3e8f3e })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Decorative distant terrain lumps
    for (let i = 0; i < 120; i++) {
      const hill = new THREE.Mesh(
        new THREE.SphereGeometry(3 + Math.random() * 8, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0x467a31 })
      );
      const angle = Math.random() * Math.PI * 2;
      const radius = 70 + Math.random() * 450;
      hill.position.set(Math.cos(angle) * radius, -2 + Math.random() * 2, Math.sin(angle) * radius);
      hill.scale.y = 0.3 + Math.random() * 0.5;
      hill.receiveShadow = true;
      hill.castShadow = true;
      scene.add(hill);
    }

    // Sky decor
    for (let i = 0; i < 24; i++) {
      const cloud = new THREE.Group();
      for (let j = 0; j < 4; j++) {
        const puff = new THREE.Mesh(
          new THREE.SphereGeometry(2.6 + Math.random() * 1.5, 14, 14),
          new THREE.MeshStandardMaterial({ color: 0xffffff })
        );
        puff.position.set(j * 2.3, Math.random() * 1.2, Math.random() * 2 - 1);
        cloud.add(puff);
      }
      cloud.position.set(
        (Math.random() - 0.5) * 500,
        35 + Math.random() * 30,
        (Math.random() - 0.5) * 500
      );
      scene.add(cloud);
    }

    // Track
    const trackRadiusX = 70;
    const trackRadiusZ = 42;
    const roadWidth = 18;
    const roadSegments = 260;
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x2b2b2b });

    const centerline = [];
    for (let i = 0; i <= roadSegments; i++) {
      const t = (i / roadSegments) * Math.PI * 2;
      centerline.push(new THREE.Vector3(
        Math.cos(t) * trackRadiusX,
        0.03,
        Math.sin(t) * trackRadiusZ
      ));
    }

    function getTrackPoint(t) {
      const a = t * Math.PI * 2;
      return new THREE.Vector3(
        Math.cos(a) * trackRadiusX,
        0,
        Math.sin(a) * trackRadiusZ
      );
    }

    function getTrackTangent(t) {
      const a = t * Math.PI * 2;
      const tx = -Math.sin(a) * trackRadiusX;
      const tz =  Math.cos(a) * trackRadiusZ;
      return new THREE.Vector3(tx, 0, tz).normalize();
    }

    for (let i = 0; i < roadSegments; i++) {
      const p1 = centerline[i];
      const p2 = centerline[i + 1];
      const dir = new THREE.Vector3().subVectors(p2, p1).normalize();
      const side = new THREE.Vector3(-dir.z, 0, dir.x);

      const len = p1.distanceTo(p2) + 0.8;
      const road = new THREE.Mesh(
        new THREE.BoxGeometry(roadWidth, 0.6, len),
        roadMat
      );

      const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
      road.position.copy(mid);
      road.position.y = -0.15;
      road.rotation.y = Math.atan2(dir.x, dir.z);
      road.receiveShadow = true;
      road.castShadow = true;
      scene.add(road);

      // Lane stripes
      if (i % 4 === 0) {
        const stripe = new THREE.Mesh(
          new THREE.BoxGeometry(0.6, 0.05, 3.5),
          new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x111111 })
        );
        stripe.position.copy(mid);
        stripe.position.y = 0.18;
        stripe.rotation.y = road.rotation.y;
        scene.add(stripe);
      }

      // Barriers
      for (const sign of [-1, 1]) {
        const barrier = new THREE.Mesh(
          new THREE.BoxGeometry(0.6, 1.4, len),
          new THREE.MeshStandardMaterial({ color: sign === -1 ? 0xd43b3b : 0x3b67d4 })
        );
        barrier.position.copy(mid.clone().add(side.clone().multiplyScalar(sign * (roadWidth / 2 + 0.9))));
        barrier.position.y = 0.7;
        barrier.rotation.y = road.rotation.y;
        barrier.castShadow = true;
        barrier.receiveShadow = true;
        scene.add(barrier);
      }
    }

    // Start/finish line
    const finishLine = new THREE.Mesh(
      new THREE.BoxGeometry(roadWidth - 1.2, 0.08, 2.5),
      new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x333333 })
    );
    finishLine.position.copy(getTrackPoint(0));
    finishLine.position.y = 0.25;
    finishLine.rotation.y = Math.PI / 2;
    scene.add(finishLine);

    // Checkered pattern squares
    for (let x = -6; x <= 6; x++) {
      for (let z = -1; z <= 1; z++) {
        if ((x + z) % 2 === 0) {
          const sq = new THREE.Mesh(
            new THREE.BoxGeometry(1, 0.06, 0.8),
            new THREE.MeshStandardMaterial({ color: 0x111111 })
          );
          sq.position.set(x, 0.27, z * 0.8);
          sq.position.add(getTrackPoint(0));
          sq.rotation.y = Math.PI / 2;
          scene.add(sq);
        }
      }
    }

    // Ramps / jumps
    const ramps = [];
    const rampTs = [0.16, 0.39, 0.66, 0.87];
    for (const t of rampTs) {
      const pos = getTrackPoint(t);
      const tangent = getTrackTangent(t);
      const angle = Math.atan2(tangent.x, tangent.z);

      const ramp = new THREE.Mesh(
        new THREE.BoxGeometry(10, 1.8, 8),
        new THREE.MeshStandardMaterial({ color: 0xc58b44 })
      );
      ramp.position.copy(pos);
      ramp.position.y = 0.75;
      ramp.rotation.y = angle;
      ramp.rotation.x = -Math.PI / 9;
      ramp.castShadow = true;
      ramp.receiveShadow = true;
      scene.add(ramp);

      ramps.push({
        mesh: ramp,
        pos: ramp.position.clone()
      });
    }

    // Boost pads
    const boosts = [];
    const boostTs = [0.09, 0.26, 0.49, 0.74];
    for (const t of boostTs) {
      const pos = getTrackPoint(t);
      const tangent = getTrackTangent(t);
      const angle = Math.atan2(tangent.x, tangent.z);

      const boost = new THREE.Mesh(
        new THREE.BoxGeometry(7, 0.12, 4),
        new THREE.MeshStandardMaterial({
          color: 0x00d5ff,
          emissive: 0x00aaff,
          metalness: 0.3,
          roughness: 0.2
        })
      );
      boost.position.copy(pos);
      boost.position.y = 0.12;
      boost.rotation.y = angle;
      boost.castShadow = false;
      boost.receiveShadow = true;
      scene.add(boost);

      boosts.push({
        mesh: boost,
        cooldown: 0
      });
    }

    // Trees
    for (let i = 0; i < 160; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 58 + Math.random() * 120;
      const x = Math.cos(angle) * dist;
      const z = Math.sin(angle) * dist;

      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.45, 0.55, 4, 8),
        new THREE.MeshStandardMaterial({ color: 0x6d4425 })
      );
      const leaves = new THREE.Mesh(
        new THREE.ConeGeometry(2.7, 6, 10),
        new THREE.MeshStandardMaterial({ color: 0x1f7a2d })
      );
      trunk.position.set(x, 2, z);
      leaves.position.set(x, 6, z);
      trunk.castShadow = leaves.castShadow = true;
      trunk.receiveShadow = leaves.receiveShadow = true;
      scene.add(trunk, leaves);
    }

    // Car
    const car = new THREE.Group();
    scene.add(car);

    const textureLoader = new THREE.TextureLoader();
    textureLoader.setCrossOrigin("anonymous");

    const carImageUrl = "https://iili.io/qaxWCzX.jpg";

    const fallbackMat = new THREE.MeshStandardMaterial({
      color: 0xdddddd,
      metalness: 0.4,
      roughness: 0.55
    });

    const carTexture = await new Promise((resolve) => {
      textureLoader.load(
        carImageUrl,
        tex => {
          tex.colorSpace = THREE.SRGBColorSpace;
          tex.wrapS = THREE.ClampToEdgeWrapping;
          tex.wrapT = THREE.ClampToEdgeWrapping;
          resolve(tex);
        },
        undefined,
        () => resolve(null)
      );
    });

    const bodyMaterials = carTexture
      ? [
          new THREE.MeshStandardMaterial({ map: carTexture, metalness: 0.35, roughness: 0.55 }),
          new THREE.MeshStandardMaterial({ map: carTexture, metalness: 0.35, roughness: 0.55 }),
          new THREE.MeshStandardMaterial({ map: carTexture, metalness: 0.35, roughness: 0.55 }),
          new THREE.MeshStandardMaterial({ map: carTexture, metalness: 0.35, roughness: 0.55 }),
          new THREE.MeshStandardMaterial({ map: carTexture, metalness: 0.35, roughness: 0.55 }),
          new THREE.MeshStandardMaterial({ map: carTexture, metalness: 0.35, roughness: 0.55 })
        ]
      : [fallbackMat, fallbackMat, fallbackMat, fallbackMat, fallbackMat, fallbackMat];

    const body = new THREE.Mesh(
      new THREE.BoxGeometry(3.2, 1.1, 6.2),
      bodyMaterials
    );
    body.position.y = 1.15;
    body.castShadow = true;
    body.receiveShadow = true;
    car.add(body);

    const cabin = new THREE.Mesh(
      new THREE.BoxGeometry(2.3, 1.0, 2.7),
      new THREE.MeshStandardMaterial({
        color: 0x99c7ff,
        transparent: true,
        opacity: 0.72,
        metalness: 0.2,
        roughness: 0.1
      })
    );
    cabin.position.set(0, 1.95, -0.2);
    cabin.castShadow = true;
    car.add(cabin);

    const wheelGeo = new THREE.CylinderGeometry(0.9, 0.9, 0.7, 20);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.95 });
    const wheelOffsets = [
      [-1.55, 0.85,  2.0],
      [ 1.55, 0.85,  2.0],
      [-1.55, 0.85, -2.0],
      [ 1.55, 0.85, -2.0]
    ];
    const wheels = [];
    wheelOffsets.forEach(([x, y, z]) => {
      const wheel = new THREE.Mesh(wheelGeo, wheelMat);
      wheel.rotation.z = Math.PI / 2;
      wheel.position.set(x, y, z);
      wheel.castShadow = true;
      car.add(wheel);
      wheels.push(wheel);
    });

    // Car shadow pad
    const shadowPad = new THREE.Mesh(
      new THREE.CircleGeometry(3.1, 24),
      new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.18 })
    );
    shadowPad.rotation.x = -Math.PI / 2;
    shadowPad.position.y = 0.03;
    car.add(shadowPad);

    // Car physics/state
    const keys = {};
    let speed = 0;
    let verticalVel = 0;
    let grounded = true;
    let yaw = 0;
    let boostsHit = 0;
    let lap = 1;
    let prevLapT = 0;

    const carState = {
      pos: new THREE.Vector3(trackRadiusX, 0.4, 0),
      vel: new THREE.Vector3(),
      reset() {
        this.pos.set(trackRadiusX, 0.4, 0);
        speed = 0;
        verticalVel = 0;
        grounded = true;
        yaw = Math.PI / 2;
        car.rotation.set(0, yaw, 0);
        car.position.copy(this.pos);
      }
    };
    carState.reset();

    function showMsg(text) {
      centerMsg.textContent = text;
      centerMsg.style.opacity = "1";
      clearTimeout(showMsg._t);
      showMsg._t = setTimeout(() => {
        centerMsg.style.opacity = "0";
      }, 900);
    }

    function nearestTrackData(pos) {
      let bestT = 0;
      let bestDist = Infinity;
      const samples = 360;
      for (let i = 0; i < samples; i++) {
        const t = i / samples;
        const p = getTrackPoint(t);
        const d = p.distanceToSquared(pos);
        if (d < bestDist) {
          bestDist = d;
          bestT = t;
        }
      }
      const center = getTrackPoint(bestT);
      const tangent = getTrackTangent(bestT);
      const side = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
      const offset = new THREE.Vector3().subVectors(pos, center);
      const lateral = offset.dot(side);
      return { t: bestT, center, tangent, side, lateral, distSq: bestDist };
    }

    function clampToTrack() {
      const data = nearestTrackData(carState.pos);
      const maxSide = roadWidth / 2 - 1.2;
      if (Math.abs(data.lateral) > maxSide) {
        const correction = Math.sign(data.lateral) * (Math.abs(data.lateral) - maxSide);
        carState.pos.add(data.side.clone().multiplyScalar(-correction));
        speed *= 0.93;
      }
      return data;
    }

    function checkBoosts() {
      for (const b of boosts) {
        if (b.cooldown > 0) continue;
        const d = b.mesh.position.distanceTo(carState.pos);
        if (d < 5.2 && grounded) {
          speed += 0.22;
          boostsHit++;
          b.cooldown = 120;
          showMsg("BOOST!");
        }
      }
    }

    function checkRamps() {
      for (const r of ramps) {
        const d = r.mesh.position.distanceTo(carState.pos);
        if (d < 6.2 && grounded && speed > 0.16) {
          verticalVel = 0.36 + Math.min(speed * 0.6, 0.22);
          grounded = false;
          showMsg("JUMP!");
          return;
        }
      }
    }

    function updateLap(trackT) {
      if (prevLapT > 0.8 && trackT < 0.2 && speed > 0.05) {
        lap++;
        showMsg("LAP " + lap);
      }
      prevLapT = trackT;
    }

    window.addEventListener("keydown", e => {
      keys[e.key.toLowerCase()] = true;
      if (e.key.toLowerCase() === "r") {
        carState.reset();
      }
    });

    window.addEventListener("keyup", e => {
      keys[e.key.toLowerCase()] = false;
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.03);

      // Inputs
      const forward = keys["w"] || keys["arrowup"];
      const backward = keys["s"] || keys["arrowdown"];
      const left = keys["a"] || keys["arrowleft"];
      const right = keys["d"] || keys["arrowright"];
      const handbrake = keys[" "];

      // Acceleration / braking
      if (forward) speed += 0.28 * dt * 3.2;
      if (backward) speed -= 0.25 * dt * 3.2;

      // Friction
      speed *= grounded ? 0.992 : 0.997;
      if (handbrake) speed *= 0.975;

      // Clamp speed
      speed = Math.max(-0.18, Math.min(0.72, speed));

      // Steering
      const steerPower = grounded ? (0.032 + Math.min(Math.abs(speed) * 0.04, 0.05)) : 0.01;
      if (left) yaw += steerPower * (speed >= 0 ? 1 : -1);
      if (right) yaw -= steerPower * (speed >= 0 ? 1 : -1);

      // Move forward in facing direction
      const forwardVec = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
      carState.pos.addScaledVector(forwardVec, speed * 1.7);

      // Gravity / jump
      if (!grounded) {
        verticalVel -= 0.018;
        car.position.y += verticalVel * 5.2;
        if (car.position.y <= 0.4) {
          car.position.y = 0.4;
          grounded = true;
          verticalVel = 0;
        }
      } else {
        car.position.y = 0.4;
      }

      // Ramp and boost logic
      checkRamps();
      checkBoosts();

      // Track correction
      const trackData = clampToTrack();
      updateLap(trackData.t);

      // Extra off-road slowdown
      const offRoadAmount = Math.max(0, Math.abs(trackData.lateral) - (roadWidth / 2 - 3));
      if (offRoadAmount > 0) speed *= 0.965;

      // Cooldowns
      for (const b of boosts) {
        if (b.cooldown > 0) b.cooldown--;
        b.mesh.material.emissiveIntensity = b.cooldown > 0 ? 0.25 : 1.4;
      }

      // Apply car transform
      car.position.x = carState.pos.x;
      car.position.z = carState.pos.z;
      car.rotation.y = yaw;

      // Car lean / pitch
      const targetRoll = (left ? -0.08 : 0) + (right ? 0.08 : 0);
      car.rotation.z += (targetRoll - car.rotation.z) * 0.08;
      const targetPitch = grounded ? -speed * 0.12 : -0.18;
      car.rotation.x += (targetPitch - car.rotation.x) * 0.08;

      // Wheel spin
      for (const wheel of wheels) {
        wheel.rotation.x -= speed * 0.65;
      }

      // Camera chase
      const camBack = new THREE.Vector3(Math.sin(yaw), 0.22, Math.cos(yaw)).multiplyScalar(-16);
      const camPos = car.position.clone().add(camBack).add(new THREE.Vector3(0, 7.5, 0));
      camera.position.lerp(camPos, 0.08);
      const lookAt = car.position.clone().add(new THREE.Vector3(0, 2.2, 0));
      camera.lookAt(lookAt);

      // HUD
      speedEl.textContent = Math.round(Math.abs(speed) * 230);
      lapEl.textContent = lap;
      boostsEl.textContent = boostsHit;

      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    loading.style.display = "none";
    animate();
  </script>
</body>
</html>
