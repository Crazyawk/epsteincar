<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open City Car Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #87ceeb;
      font-family: Arial, sans-serif;
    }
    canvas { display: block; }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: white;
      background: rgba(0,0,0,0.38);
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.45;
      z-index: 10;
      backdrop-filter: blur(5px);
      max-width: 280px;
    }
    #msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 34px;
      font-weight: bold;
      text-shadow: 0 2px 14px rgba(0,0,0,0.75);
      z-index: 20;
      opacity: 0;
      transition: opacity .25s;
      pointer-events: none;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(#6ec6ff, #3576d6);
      color: white;
      font-size: 28px;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="loading">Loading city...</div>

  <div id="hud">
    <div><b>Open City Car Game</b></div>
    <div>W / ↑ = Drive</div>
    <div>S / ↓ = Brake / Reverse</div>
    <div>A / D = Steer</div>
    <div>Space = Handbrake</div>
    <div>R = Reset</div>
    <div>C = Camera Mode</div>
    <hr style="border-color: rgba(255,255,255,0.2);">
    <div>Speed: <span id="speed">0</span></div>
    <div>Position: <span id="pos">0, 0</span></div>
    <div>Jumps hit: <span id="jumps">0</span></div>
    <div>Traffic cars: <span id="traffic">0</span></div>
  </div>

  <div id="msg">BOOST!</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    const loading = document.getElementById("loading");
    const speedEl = document.getElementById("speed");
    const posEl = document.getElementById("pos");
    const jumpsEl = document.getElementById("jumps");
    const trafficEl = document.getElementById("traffic");
    const msgEl = document.getElementById("msg");

    const CAR_IMAGE = "https://iili.io/qaxWCzX.jpg";

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x98d8ff, 180, 950);

    const camera = new THREE.PerspectiveCamera(
      72,
      window.innerWidth / window.innerHeight,
      0.1,
      2000
    );

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.HemisphereLight(0xffffff, 0x6b8b55, 1.15);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(180, 250, 120);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048;
    sun.shadow.mapSize.height = 2048;
    sun.shadow.camera.left = -300;
    sun.shadow.camera.right = 300;
    sun.shadow.camera.top = 300;
    sun.shadow.camera.bottom = -300;
    scene.add(sun);

    // ===== WORLD =====
    const WORLD_SIZE = 900;
    const ROAD_W = 22;
    const BLOCK = 90;
    const HALF = WORLD_SIZE / 2;

    const textureLoader = new THREE.TextureLoader();
    textureLoader.crossOrigin = "anonymous";

    let photoTex = null;
    textureLoader.load(
      CAR_IMAGE,
      function (tex) {
        tex.colorSpace = THREE.SRGBColorSpace;
        photoTex = tex;
      },
      undefined,
      function () {
        console.log("Photo texture failed to load. Falling back.");
      }
    );

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(WORLD_SIZE * 1.8, WORLD_SIZE * 1.8),
      new THREE.MeshStandardMaterial({ color: 0x5b9b50 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Far water / edge tint
    const outskirts = new THREE.Mesh(
      new THREE.RingGeometry(WORLD_SIZE * 0.9, WORLD_SIZE * 1.5, 64),
      new THREE.MeshStandardMaterial({
        color: 0x6fba7d,
        side: THREE.DoubleSide
      })
    );
    outskirts.rotation.x = -Math.PI / 2;
    outskirts.position.y = 0.02;
    scene.add(outskirts);

    const roadMat = new THREE.MeshStandardMaterial({ color: 0x2b2b2b });
    const lineMat = new THREE.MeshStandardMaterial({ color: 0xf5f2a8, emissive: 0x222200 });
    const sideLineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x111111 });
    const sidewalkMat = new THREE.MeshStandardMaterial({ color: 0x9d9d9d });
    const glassPalette = [0x8fc8ff, 0x7db5ea, 0xa7d8ff, 0x6fa3d7, 0xb7e0ff];

    const roads = [];
    const trafficLanes = [];
    const jumps = [];
    const boosts = [];
    const colliders = [];

    function addRoadX(z, length = WORLD_SIZE) {
      const road = new THREE.Mesh(
        new THREE.BoxGeometry(length, 0.2, ROAD_W),
        roadMat
      );
      road.position.set(0, 0.05, z);
      road.receiveShadow = true;
      road.castShadow = false;
      scene.add(road);
      roads.push({ type: "x", z, min: -length/2, max: length/2 });

      const walk1 = new THREE.Mesh(
        new THREE.BoxGeometry(length, 0.15, 8),
        sidewalkMat
      );
      walk1.position.set(0, 0.11, z - ROAD_W/2 - 4);
      walk1.receiveShadow = true;
      scene.add(walk1);

      const walk2 = walk1.clone();
      walk2.position.z = z + ROAD_W/2 + 4;
      scene.add(walk2);

      for (let x = -length/2 + 12; x < length/2 - 12; x += 28) {
        const dash = new THREE.Mesh(
          new THREE.BoxGeometry(12, 0.05, 0.9),
          lineMat
        );
        dash.position.set(x, 0.18, z);
        scene.add(dash);
      }

      for (let x = -length/2 + 8; x < length/2 - 8; x += 20) {
        const edge1 = new THREE.Mesh(
          new THREE.BoxGeometry(8, 0.03, 0.35),
          sideLineMat
        );
        edge1.position.set(x, 0.17, z - ROAD_W/2 + 1.3);
        scene.add(edge1);

        const edge2 = edge1.clone();
        edge2.position.z = z + ROAD_W/2 - 1.3;
        scene.add(edge2);
      }

      trafficLanes.push(
        { axis: "x", coord: z - 5.5, dir: 1, min: -length/2 + 20, max: length/2 - 20 },
        { axis: "x", coord: z + 5.5, dir: -1, min: -length/2 + 20, max: length/2 - 20 }
      );
    }

    function addRoadZ(x, length = WORLD_SIZE) {
      const road = new THREE.Mesh(
        new THREE.BoxGeometry(ROAD_W, 0.2, length),
        roadMat
      );
      road.position.set(x, 0.05, 0);
      road.receiveShadow = true;
      scene.add(road);
      roads.push({ type: "z", x, min: -length/2, max: length/2 });

      const walk1 = new THREE.Mesh(
        new THREE.BoxGeometry(8, 0.15, length),
        sidewalkMat
      );
      walk1.position.set(x - ROAD_W/2 - 4, 0.11, 0);
      walk1.receiveShadow = true;
      scene.add(walk1);

      const walk2 = walk1.clone();
      walk2.position.x = x + ROAD_W/2 + 4;
      scene.add(walk2);

      for (let z = -length/2 + 12; z < length/2 - 12; z += 28) {
        const dash = new THREE.Mesh(
          new THREE.BoxGeometry(0.9, 0.05, 12),
          lineMat
        );
        dash.position.set(x, 0.18, z);
        scene.add(dash);
      }

      for (let z = -length/2 + 8; z < length/2 - 8; z += 20) {
        const edge1 = new THREE.Mesh(
          new THREE.BoxGeometry(0.35, 0.03, 8),
          sideLineMat
        );
        edge1.position.set(x - ROAD_W/2 + 1.3, 0.17, z);
        scene.add(edge1);

        const edge2 = edge1.clone();
        edge2.position.x = x + ROAD_W/2 - 1.3;
        scene.add(edge2);
      }

      trafficLanes.push(
        { axis: "z", coord: x - 5.5, dir: -1, min: -length/2 + 20, max: length/2 - 20 },
        { axis: "z", coord: x + 5.5, dir: 1, min: -length/2 + 20, max: length/2 - 20 }
      );
    }

    for (let i = -4; i <= 4; i++) {
      addRoadX(i * BLOCK);
      addRoadZ(i * BLOCK);
    }

    // Intersection pads
    for (let ix = -4; ix <= 4; ix++) {
      for (let iz = -4; iz <= 4; iz++) {
        const inter = new THREE.Mesh(
          new THREE.BoxGeometry(ROAD_W, 0.21, ROAD_W),
          roadMat
        );
        inter.position.set(ix * BLOCK, 0.051, iz * BLOCK);
        inter.receiveShadow = true;
        scene.add(inter);
      }
    }

    // Buildings
    function addBuilding(x, z, w, h, d, color, usePhotoBillboard = false) {
      const group = new THREE.Group();

      const base = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshStandardMaterial({
          color,
          metalness: 0.15,
          roughness: 0.78
        })
      );
      base.position.y = h / 2;
      base.castShadow = true;
      base.receiveShadow = true;
      group.add(base);

      // Window strips
      const floors = Math.max(3, Math.floor(h / 8));
      const cols = Math.max(2, Math.floor(w / 6));
      const rows = Math.max(2, Math.floor(d / 6));
      const winMat = new THREE.MeshStandardMaterial({
        color: glassPalette[Math.floor(Math.random() * glassPalette.length)],
        emissive: 0x223344,
        metalness: 0.8,
        roughness: 0.18
      });

      for (let fy = 0; fy < floors; fy++) {
        for (let cx = 0; cx < cols; cx++) {
          if (Math.random() < 0.12) continue;
          const win = new THREE.Mesh(
            new THREE.BoxGeometry(w / (cols + 2), 1.8, 0.25),
            winMat
          );
          win.position.set(
            -w/2 + ((cx + 1.5) * w / (cols + 1)),
            3 + fy * (h - 6) / floors,
            d/2 + 0.13
          );
          group.add(win);
        }
      }

      for (let fy = 0; fy < floors; fy++) {
        for (let rz = 0; rz < rows; rz++) {
          if (Math.random() < 0.12) continue;
          const win = new THREE.Mesh(
            new THREE.BoxGeometry(0.25, 1.8, d / (rows + 2)),
            winMat
          );
          win.position.set(
            w/2 + 0.13,
            3 + fy * (h - 6) / floors,
            -d/2 + ((rz + 1.5) * d / (rows + 1))
          );
          group.add(win);
        }
      }

      if (usePhotoBillboard) {
        const billboardMat = photoTex
          ? new THREE.MeshStandardMaterial({
              map: photoTex,
              emissive: 0x111111,
              roughness: 0.55,
              metalness: 0.2
            })
          : new THREE.MeshStandardMaterial({ color: 0xffffff });

        const board = new THREE.Mesh(
          new THREE.PlaneGeometry(Math.min(w * 0.75, 28), Math.min(h * 0.35, 20)),
          billboardMat
        );
        board.position.set(0, h * 0.72, d/2 + 0.2);
        group.add(board);
      }

      group.position.set(x, 0, z);
      scene.add(group);

      colliders.push({
        x: x,
        z: z,
        hw: w / 2 + 2,
        hd: d / 2 + 2
      });
    }

    const buildColors = [0x6d7784, 0x8b6d5c, 0x5d6e7d, 0x887f75, 0x6f8089, 0x7a7370];

    for (let gx = -4; gx < 4; gx++) {
      for (let gz = -4; gz < 4; gz++) {
        const baseX = gx * BLOCK + BLOCK / 2;
        const baseZ = gz * BLOCK + BLOCK / 2;

        const localSpots = [
          [-18, -18], [18, -18], [-18, 18], [18, 18]
        ];

        for (let i = 0; i < localSpots.length; i++) {
          const sx = baseX + localSpots[i][0];
          const sz = baseZ + localSpots[i][1];
          const w = 16 + Math.random() * 16;
          const d = 16 + Math.random() * 16;
          const h = 22 + Math.random() * 90;
          const col = buildColors[Math.floor(Math.random() * buildColors.length)];
          const photoBoard = Math.random() < 0.13;
          addBuilding(sx, sz, w, h, d, col, photoBoard);
        }
      }
    }

    // Trees / lamps
    function addTree(x, z) {
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.7, 0.9, 6, 8),
        new THREE.MeshStandardMaterial({ color: 0x6d4425 })
      );
      trunk.position.set(x, 3, z);
      trunk.castShadow = true;
      trunk.receiveShadow = true;
      scene.add(trunk);

      const leaves = new THREE.Mesh(
        new THREE.SphereGeometry(3.8, 12, 12),
        new THREE.MeshStandardMaterial({ color: 0x2f8f3d })
      );
      leaves.position.set(x, 8, z);
      leaves.castShadow = true;
      leaves.receiveShadow = true;
      scene.add(leaves);
    }

    function addLamp(x, z, rot = 0) {
      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18, 0.24, 8, 8),
        new THREE.MeshStandardMaterial({ color: 0x555555 })
      );
      pole.position.set(x, 4, z);
      pole.castShadow = true;
      scene.add(pole);

      const arm = new THREE.Mesh(
        new THREE.BoxGeometry(2.2, 0.18, 0.18),
        new THREE.MeshStandardMaterial({ color: 0x666666 })
      );
      arm.position.set(x + Math.cos(rot) * 0.9, 7.8, z + Math.sin(rot) * 0.9);
      arm.rotation.y = rot;
      scene.add(arm);

      const lamp = new THREE.Mesh(
        new THREE.SphereGeometry(0.35, 10, 10),
        new THREE.MeshStandardMaterial({ color: 0xfff3c4, emissive: 0x775500 })
      );
      lamp.position.set(x + Math.cos(rot) * 1.8, 7.7, z + Math.sin(rot) * 1.8);
      scene.add(lamp);
    }

    for (let i = -4; i <= 4; i++) {
      for (let j = -4; j <= 4; j++) {
        const x = i * BLOCK;
        const z = j * BLOCK;

        addLamp(x + ROAD_W/2 + 6, z + ROAD_W/2 + 6, 0);
        addLamp(x - ROAD_W/2 - 6, z - ROAD_W/2 - 6, Math.PI);

        if (Math.abs(i) < 4 && Math.abs(j) < 4) {
          addTree(x + 28, z + 28);
          addTree(x - 28, z + 20);
        }
      }
    }

    // Jumps
    function addJump(x, z, rotY) {
      const ramp = new THREE.Mesh(
        new THREE.BoxGeometry(18, 2.6, 10),
        new THREE.MeshStandardMaterial({ color: 0xc58b44 })
      );
      ramp.position.set(x, 1.2, z);
      ramp.rotation.y = rotY;
      ramp.rotation.x = -Math.PI / 8;
      ramp.castShadow = true;
      ramp.receiveShadow = true;
      scene.add(ramp);

      jumps.push({ x, z, rotY, mesh: ramp });
    }

    addJump(-135, -90, 0);
    addJump(45, 180, Math.PI / 2);
    addJump(180, -180, Math.PI);
    addJump(-225, 225, -Math.PI / 2);
    addJump(270, 0, 0);
    addJump(0, -270, Math.PI / 2);

    // Boost pads
    function addBoost(x, z, rotY) {
      const pad = new THREE.Mesh(
        new THREE.BoxGeometry(12, 0.18, 6),
        new THREE.MeshStandardMaterial({
          color: 0x00d5ff,
          emissive: 0x00aaff,
          roughness: 0.2,
          metalness: 0.3
        })
      );
      pad.position.set(x, 0.14, z);
      pad.rotation.y = rotY;
      scene.add(pad);
      boosts.push({ x, z, mesh: pad, cooldown: 0 });
    }

    addBoost(-270, -5.5, 0);
    addBoost(90, 5.5, 0);
    addBoost(5.5, -180, Math.PI / 2);
    addBoost(-5.5, 180, Math.PI / 2);
    addBoost(180, -95.5, 0);
    addBoost(-180, 95.5, 0);

    // Billboards in city
    function addBillboard(x, z, rotY) {
      const pole1 = new THREE.Mesh(
        new THREE.CylinderGeometry(0.4, 0.5, 10, 8),
        new THREE.MeshStandardMaterial({ color: 0x777777 })
      );
      const pole2 = pole1.clone();
      pole1.position.set(x - Math.cos(rotY) * 6, 5, z - Math.sin(rotY) * 6);
      pole2.position.set(x + Math.cos(rotY) * 6, 5, z + Math.sin(rotY) * 6);
      scene.add(pole1, pole2);

      const mat = photoTex
        ? new THREE.MeshStandardMaterial({ map: photoTex, emissive: 0x111111 })
        : new THREE.MeshStandardMaterial({ color: 0xffffff });

      const board = new THREE.Mesh(
        new THREE.PlaneGeometry(18, 9),
        mat
      );
      board.position.set(x, 12, z);
      board.rotation.y = rotY;
      scene.add(board);
    }

    addBillboard(-320, -40, Math.PI / 2);
    addBillboard(320, 60, -Math.PI / 2);
    addBillboard(50, -320, 0);
    addBillboard(-50, 320, Math.PI);

    // ===== PLAYER CAR =====
    const playerCar = new THREE.Group();
    scene.add(playerCar);

    const carBodyGeo = new THREE.BoxGeometry(4.5, 1.4, 8.8);

    function makeCarBodyMaterial() {
      if (photoTex) {
        photoTex.wrapS = THREE.ClampToEdgeWrapping;
        photoTex.wrapT = THREE.ClampToEdgeWrapping;
        photoTex.repeat.set(1, 1);
        return [
          new THREE.MeshStandardMaterial({ map: photoTex, metalness: 0.25, roughness: 0.5 }),
          new THREE.MeshStandardMaterial({ map: photoTex, metalness: 0.25, roughness: 0.5 }),
          new THREE.MeshStandardMaterial({ map: photoTex, metalness: 0.25, roughness: 0.5 }),
          new THREE.MeshStandardMaterial({ map: photoTex, metalness: 0.25, roughness: 0.5 }),
          new THREE.MeshStandardMaterial({ map: photoTex, metalness: 0.25, roughness: 0.5 }),
          new THREE.MeshStandardMaterial({ map: photoTex, metalness: 0.25, roughness: 0.5 })
        ];
      }
      const m = new THREE.MeshStandardMaterial({ color: 0xe3e3e3, metalness: 0.35, roughness: 0.55 });
      return [m, m, m, m, m, m];
    }

    const body = new THREE.Mesh(carBodyGeo, makeCarBodyMaterial());
    body.position.y = 1.55;
    body.castShadow = true;
    body.receiveShadow = true;
    playerCar.add(body);

    const hoodPhoto = new THREE.Mesh(
      new THREE.PlaneGeometry(3.8, 3.4),
      photoTex
        ? new THREE.MeshStandardMaterial({ map: photoTex, transparent: false })
        : new THREE.MeshStandardMaterial({ color: 0xffffff })
    );
    hoodPhoto.rotation.x = -Math.PI / 2;
    hoodPhoto.position.set(0, 2.28, 1.2);
    playerCar.add(hoodPhoto);

    const roof = new THREE.Mesh(
      new THREE.BoxGeometry(3.2, 1.1, 3.6),
      new THREE.MeshStandardMaterial({
        color: 0x9ecfff,
        transparent: true,
        opacity: 0.78,
        roughness: 0.1,
        metalness: 0.2
      })
    );
    roof.position.set(0, 2.45, -0.3);
    roof.castShadow = true;
    playerCar.add(roof);

    const spoiler = new THREE.Mesh(
      new THREE.BoxGeometry(3.4, 0.18, 0.6),
      new THREE.MeshStandardMaterial({ color: 0x202020 })
    );
    spoiler.position.set(0, 2.25, -3.8);
    playerCar.add(spoiler);

    const wheelGeo = new THREE.CylinderGeometry(1.0, 1.0, 0.9, 20);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.95 });
    const wheelOffsets = [
      [-2.2, 0.95, 2.8],
      [ 2.2, 0.95, 2.8],
      [-2.2, 0.95,-2.8],
      [ 2.2, 0.95,-2.8]
    ];
    const playerWheels = [];
    wheelOffsets.forEach(([x, y, z]) => {
      const wheel = new THREE.Mesh(wheelGeo, wheelMat);
      wheel.rotation.z = Math.PI / 2;
      wheel.position.set(x, y, z);
      wheel.castShadow = true;
      playerCar.add(wheel);
      playerWheels.push(wheel);
    });

    const shadowPad = new THREE.Mesh(
      new THREE.CircleGeometry(4.4, 24),
      new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.18 })
    );
    shadowPad.rotation.x = -Math.PI / 2;
    shadowPad.position.y = 0.03;
    playerCar.add(shadowPad);

    // ===== TRAFFIC =====
    function createTrafficCar(color) {
      const g = new THREE.Group();

      const b = new THREE.Mesh(
        new THREE.BoxGeometry(4, 1.25, 7.5),
        new THREE.MeshStandardMaterial({ color, metalness: 0.22, roughness: 0.55 })
      );
      b.position.y = 1.4;
      b.castShadow = true;
      b.receiveShadow = true;
      g.add(b);

      const cab = new THREE.Mesh(
        new THREE.BoxGeometry(2.8, 0.95, 2.7),
        new THREE.MeshStandardMaterial({
          color: 0x97c8ff,
          transparent: true,
          opacity: 0.72
        })
      );
      cab.position.set(0, 2.2, -0.1);
      g.add(cab);

      const wheelOffsets = [
        [-1.8, 0.85, 2.3],
        [ 1.8, 0.85, 2.3],
        [-1.8, 0.85,-2.3],
        [ 1.8, 0.85,-2.3]
      ];
      wheelOffsets.forEach(([x,y,z]) => {
        const w = new THREE.Mesh(wheelGeo, wheelMat);
        w.rotation.z = Math.PI / 2;
        w.position.set(x,y,z);
        g.add(w);
      });

      scene.add(g);
      return g;
    }

    const trafficCars = [];
    const trafficColors = [0xff4444, 0x4488ff, 0xffffff, 0x111111, 0xffcc33, 0x66dd66];

    for (let i = 0; i < 16; i++) {
      const lane = trafficLanes[Math.floor(Math.random() * trafficLanes.length)];
      const mesh = createTrafficCar(trafficColors[Math.floor(Math.random() * trafficColors.length)]);
      const t = lane.min + Math.random() * (lane.max - lane.min);
      const speed = 0.35 + Math.random() * 0.35;

      trafficCars.push({
        mesh,
        lane,
        t,
        speed
      });
    }

    trafficEl.textContent = trafficCars.length;

    function updateTraffic() {
      for (const c of trafficCars) {
        c.t += c.speed * c.lane.dir;

        if (c.t > c.lane.max) c.t = c.lane.min;
        if (c.t < c.lane.min) c.t = c.lane.max;

        if (c.lane.axis === "x") {
          c.mesh.position.set(c.t, 0, c.lane.coord);
          c.mesh.rotation.y = c.lane.dir > 0 ? Math.PI / 2 : -Math.PI / 2;
        } else {
          c.mesh.position.set(c.lane.coord, 0, c.t);
          c.mesh.rotation.y = c.lane.dir > 0 ? 0 : Math.PI;
        }
      }
    }

    // ===== GAME STATE =====
    const keys = {};
    let speed = 0;
    let yaw = 0;
    let verticalVel = 0;
    let grounded = true;
    let jumpsHit = 0;
    let cameraMode = 0;

    const state = {
      x: 0,
      y: 0.45,
      z: 0,
      reset() {
        this.x = 0;
        this.y = 0.45;
        this.z = 0;
        yaw = 0;
        speed = 0;
        verticalVel = 0;
        grounded = true;
        playerCar.position.set(this.x, this.y, this.z);
        playerCar.rotation.set(0, yaw, 0);
      }
    };
    state.reset();

    function showMsg(text) {
      msgEl.textContent = text;
      msgEl.style.opacity = "1";
      clearTimeout(showMsg._t);
      showMsg._t = setTimeout(() => {
        msgEl.style.opacity = "0";
      }, 850);
    }

    function clampWorld() {
      state.x = Math.max(-HALF + 10, Math.min(HALF - 10, state.x));
      state.z = Math.max(-HALF + 10, Math.min(HALF - 10, state.z));
    }

    function resolveBuildingCollisions(prevX, prevZ) {
      for (const c of colliders) {
        if (
          Math.abs(state.x - c.x) < c.hw + 2.5 &&
          Math.abs(state.z - c.z) < c.hd + 2.5
        ) {
          state.x = prevX;
          state.z = prevZ;
          speed *= -0.18;
          showMsg("CRASH!");
          return;
        }
      }
    }

    function resolveTrafficCollisions() {
      for (const c of trafficCars) {
        const dx = state.x - c.mesh.position.x;
        const dz = state.z - c.mesh.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist < 6) {
          speed *= -0.15;
          state.x += dx * 0.25;
          state.z += dz * 0.25;
          showMsg("TRAFFIC!");
        }
      }
    }

    function isNearRoad(x, z) {
      for (const r of roads) {
        if (r.type === "x") {
          if (Math.abs(z - r.z) <= ROAD_W / 2 && x >= r.min && x <= r.max) return true;
        } else {
          if (Math.abs(x - r.x) <= ROAD_W / 2 && z >= r.min && z <= r.max) return true;
        }
      }
      return false;
    }

    function checkJumps() {
      for (const j of jumps) {
        const dx = state.x - j.x;
        const dz = state.z - j.z;
        const d = Math.sqrt(dx*dx + dz*dz);
        if (d < 10 && grounded && speed > 0.22) {
          verticalVel = 0.52 + Math.min(speed * 0.45, 0.25);
          grounded = false;
          jumpsHit++;
          jumpsEl.textContent = jumpsHit;
          showMsg("JUMP!");
          return;
        }
      }
    }

    function checkBoosts() {
      for (const b of boosts) {
        if (b.cooldown > 0) continue;
        const dx = state.x - b.x;
        const dz = state.z - b.z;
        const d = Math.sqrt(dx*dx + dz*dz);
        if (d < 8) {
          speed += 0.22;
          b.cooldown = 120;
          showMsg("BOOST!");
        }
      }
    }

    function updateBoosts() {
      for (const b of boosts) {
        if (b.cooldown > 0) b.cooldown--;
        b.mesh.material.emissiveIntensity = b.cooldown > 0 ? 0.25 : 1.5;
      }
    }

    window.addEventListener("keydown", (e) => {
      const k = e.key.toLowerCase();
      keys[k] = true;
      if (k === "r") state.reset();
      if (k === "c") cameraMode = (cameraMode + 1) % 3;
    });

    window.addEventListener("keyup", (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.03);

      updateTraffic();

      const forward = keys["w"] || keys["arrowup"];
      const backward = keys["s"] || keys["arrowdown"];
      const left = keys["a"] || keys["arrowleft"];
      const right = keys["d"] || keys["arrowright"];
      const handbrake = keys[" "];

      if (forward) speed += 0.34 * dt * 3.3;
      if (backward) speed -= 0.28 * dt * 3.0;

      speed *= grounded ? 0.992 : 0.996;
      if (handbrake) speed *= 0.975;

      speed = Math.max(-0.24, Math.min(1.05, speed));

      const steer = grounded
        ? 0.024 + Math.min(Math.abs(speed) * 0.032, 0.05)
        : 0.009;

      if (left) yaw += steer * (speed >= 0 ? 1 : -1);
      if (right) yaw -= steer * (speed >= 0 ? 1 : -1);

      const prevX = state.x;
      const prevZ = state.z;

      const forwardVec = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
      state.x += forwardVec.x * speed * 2.2;
      state.z += forwardVec.z * speed * 2.2;

      if (!grounded) {
        verticalVel -= 0.022;
        state.y += verticalVel * 5.2;
        if (state.y <= 0.45) {
          state.y = 0.45;
          grounded = true;
          verticalVel = 0;
        }
      } else {
        state.y = 0.45;
      }

      clampWorld();
      resolveBuildingCollisions(prevX, prevZ);
      resolveTrafficCollisions();

      if (!isNearRoad(state.x, state.z)) {
        speed *= 0.972;
      }

      checkJumps();
      checkBoosts();
      updateBoosts();

      playerCar.position.set(state.x, state.y, state.z);
      playerCar.rotation.y = yaw;

      const targetRoll = (left ? -0.1 : 0) + (right ? 0.1 : 0);
      playerCar.rotation.z += (targetRoll - playerCar.rotation.z) * 0.08;

      const targetPitch = grounded ? -speed * 0.11 : -0.2;
      playerCar.rotation.x += (targetPitch - playerCar.rotation.x) * 0.08;

      for (const w of playerWheels) {
        w.rotation.x -= speed * 0.7;
      }

      if (cameraMode === 0) {
        const camBack = new THREE.Vector3(Math.sin(yaw), 0.18, Math.cos(yaw)).multiplyScalar(-18);
        const camPos = playerCar.position.clone().add(camBack).add(new THREE.Vector3(0, 8.5, 0));
        camera.position.lerp(camPos, 0.08);
        camera.lookAt(playerCar.position.clone().add(new THREE.Vector3(0, 2.4, 0)));
      } else if (cameraMode === 1) {
        const camSide = new THREE.Vector3(Math.cos(yaw) * 12, 6.5, -Math.sin(yaw) * 12);
        const camPos = playerCar.position.clone().add(camSide);
        camera.position.lerp(camPos, 0.08);
        camera.lookAt(playerCar.position.clone().add(new THREE.Vector3(0, 1.8, 0)));
      } else {
        const camPos = playerCar.position.clone().add(new THREE.Vector3(0, 32, 0.01));
        camera.position.lerp(camPos, 0.08);
        camera.lookAt(playerCar.position);
      }

      speedEl.textContent = Math.round(Math.abs(speed) * 190);
      posEl.textContent = `${Math.round(state.x)}, ${Math.round(state.z)}`;

      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function refreshPhotoMaterials() {
      if (!photoTex) return;

      body.material = [
        new THREE.MeshStandardMaterial({ map: photoTex, metalness: 0.25, roughness: 0.5 }),
        new THREE.MeshStandardMaterial({ map: photoTex, metalness: 0.25, roughness: 0.5 }),
        new THREE.MeshStandardMaterial({ map: photoTex, metalness: 0.25, roughness: 0.5 }),
        new THREE.MeshStandardMaterial({ map: photoTex, metalness: 0.25, roughness: 0.5 }),
        new THREE.MeshStandardMaterial({ map: photoTex, metalness: 0.25, roughness: 0.5 }),
        new THREE.MeshStandardMaterial({ map: photoTex, metalness: 0.25, roughness: 0.5 })
      ];
      hoodPhoto.material = new THREE.MeshStandardMaterial({ map: photoTex });
    }

    setTimeout(() => {
      refreshPhotoMaterials();
    }, 1200);

    loading.style.display = "none";
    animate();
  </script>
</body>
</html>
