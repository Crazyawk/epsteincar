<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Big City Car Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #8fd3ff;
      font-family: Arial, sans-serif;
    }
    canvas { display: block; }
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      color: white;
      background: rgba(0,0,0,0.38);
      border-radius: 12px;
      padding: 10px 12px;
      line-height: 1.35;
      font-size: 13px;
      max-width: 300px;
      backdrop-filter: blur(4px);
    }
    #msg {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 34px;
      font-weight: bold;
      text-shadow: 0 2px 12px rgba(0,0,0,0.7);
      opacity: 0;
      transition: opacity .2s;
      z-index: 20;
      pointer-events: none;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      background: linear-gradient(#6fc8ff, #3c79d6);
      color: white;
      font-size: 26px;
    }
  </style>
</head>
<body>
  <div id="loading">Loading big city...</div>
  <div id="hud">
    <div><b>Big City Police Chase</b></div>
    <div>W / ↑ drive</div>
    <div>S / ↓ brake / reverse</div>
    <div>A / D steer</div>
    <div>Space handbrake</div>
    <div>R reset</div>
    <div>C camera</div>
    <hr style="border-color: rgba(255,255,255,0.2);">
    <div>Speed: <span id="speed">0</span></div>
    <div>Wanted: <span id="wanted">0</span></div>
    <div>Police hits: <span id="hits">0</span>/5</div>
    <div>Traffic light: <span id="light">-</span></div>
    <div>Traffic cars: <span id="trafficCount">0</span></div>
    <div>Police cars: <span id="policeCount">0</span></div>
  </div>
  <div id="msg">BUSTED</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    const loading = document.getElementById("loading");
    const speedEl = document.getElementById("speed");
    const wantedEl = document.getElementById("wanted");
    const hitsEl = document.getElementById("hits");
    const lightEl = document.getElementById("light");
    const trafficCountEl = document.getElementById("trafficCount");
    const policeCountEl = document.getElementById("policeCount");
    const msgEl = document.getElementById("msg");

    const CAR_IMAGE = "https://iili.io/qaxWCzX.jpg";

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x9ad8ff, 260, 1500);

    const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 2500);
    const renderer = new THREE.WebGLRenderer({
      antialias: false,
      powerPreference: "high-performance"
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.shadowMap.enabled = false;
    document.body.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0xffffff, 0x64824e, 1.2);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(150, 220, 80);
    scene.add(sun);

    const WORLD_SIZE = 1800;
    const HALF = WORLD_SIZE / 2;
    const BLOCK = 100;
    const ROAD_W = 24;
    const ROAD_HALF = ROAD_W / 2;
    const ROAD_POSITIONS = [];
    for (let i = -7; i <= 7; i++) ROAD_POSITIONS.push(i * BLOCK);

    const roadMat = new THREE.MeshLambertMaterial({ color: 0x2e2e2e });
    const lineYellow = new THREE.MeshLambertMaterial({ color: 0xf2dc75 });
    const lineWhite = new THREE.MeshLambertMaterial({ color: 0xf4f4f4 });
    const sidewalkMat = new THREE.MeshLambertMaterial({ color: 0xa3a3a3 });
    const grassMat = new THREE.MeshLambertMaterial({ color: 0x5ca24f });

    const texLoader = new THREE.TextureLoader();
    texLoader.crossOrigin = "anonymous";
    let carTex = null;

    texLoader.load(
      CAR_IMAGE,
      (t) => {
        t.colorSpace = THREE.SRGBColorSpace;
        carTex = t;
        if (playerBody) applyPlayerTexture();
      },
      undefined,
      () => {}
    );

    function showMsg(text, ms = 800) {
      msgEl.textContent = text;
      msgEl.style.opacity = "1";
      clearTimeout(showMsg.t);
      showMsg.t = setTimeout(() => msgEl.style.opacity = "0", ms);
    }

    // Ground
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(WORLD_SIZE * 2.2, WORLD_SIZE * 2.2),
      grassMat
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Roads
    const roadGroup = new THREE.Group();
    scene.add(roadGroup);

    function addRoadX(z) {
      const road = new THREE.Mesh(
        new THREE.BoxGeometry(WORLD_SIZE, 0.15, ROAD_W),
        roadMat
      );
      road.position.set(0, 0.05, z);
      roadGroup.add(road);

      const sw1 = new THREE.Mesh(
        new THREE.BoxGeometry(WORLD_SIZE, 0.1, 6),
        sidewalkMat
      );
      sw1.position.set(0, 0.09, z - ROAD_HALF - 3);
      roadGroup.add(sw1);

      const sw2 = sw1.clone();
      sw2.position.z = z + ROAD_HALF + 3;
      roadGroup.add(sw2);

      for (let x = -HALF + 20; x < HALF - 20; x += 30) {
        const dash = new THREE.Mesh(
          new THREE.BoxGeometry(14, 0.04, 0.8),
          lineYellow
        );
        dash.position.set(x, 0.13, z);
        roadGroup.add(dash);
      }

      for (let x = -HALF + 15; x < HALF - 15; x += 24) {
        const e1 = new THREE.Mesh(
          new THREE.BoxGeometry(10, 0.03, 0.3),
          lineWhite
        );
        e1.position.set(x, 0.12, z - ROAD_HALF + 1.2);
        roadGroup.add(e1);

        const e2 = e1.clone();
        e2.position.z = z + ROAD_HALF - 1.2;
        roadGroup.add(e2);
      }
    }

    function addRoadZ(x) {
      const road = new THREE.Mesh(
        new THREE.BoxGeometry(ROAD_W, 0.15, WORLD_SIZE),
        roadMat
      );
      road.position.set(x, 0.05, 0);
      roadGroup.add(road);

      const sw1 = new THREE.Mesh(
        new THREE.BoxGeometry(6, 0.1, WORLD_SIZE),
        sidewalkMat
      );
      sw1.position.set(x - ROAD_HALF - 3, 0.09, 0);
      roadGroup.add(sw1);

      const sw2 = sw1.clone();
      sw2.position.x = x + ROAD_HALF + 3;
      roadGroup.add(sw2);

      for (let z = -HALF + 20; z < HALF - 20; z += 30) {
        const dash = new THREE.Mesh(
          new THREE.BoxGeometry(0.8, 0.04, 14),
          lineYellow
        );
        dash.position.set(x, 0.13, z);
        roadGroup.add(dash);
      }

      for (let z = -HALF + 15; z < HALF - 15; z += 24) {
        const e1 = new THREE.Mesh(
          new THREE.BoxGeometry(0.3, 0.03, 10),
          lineWhite
        );
        e1.position.set(x - ROAD_HALF + 1.2, 0.12, z);
        roadGroup.add(e1);

        const e2 = e1.clone();
        e2.position.x = x + ROAD_HALF - 1.2;
        roadGroup.add(e2);
      }
    }

    ROAD_POSITIONS.forEach(addRoadX);
    ROAD_POSITIONS.forEach(addRoadZ);

    // Intersections
    const intersections = [];
    const lights = [];
    const lightState = { nsGreen: true, timer: 0 };

    function createTrafficLight(x, z, rotY) {
      const g = new THREE.Group();

      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18, 0.22, 7, 8),
        new THREE.MeshLambertMaterial({ color: 0x444444 })
      );
      pole.position.y = 3.5;
      g.add(pole);

      const arm = new THREE.Mesh(
        new THREE.BoxGeometry(2.4, 0.18, 0.18),
        new THREE.MeshLambertMaterial({ color: 0x555555 })
      );
      arm.position.set(1.1, 6.4, 0);
      g.add(arm);

      const box = new THREE.Mesh(
        new THREE.BoxGeometry(0.55, 1.3, 0.55),
        new THREE.MeshLambertMaterial({ color: 0x222222 })
      );
      box.position.set(2.1, 6.05, 0);
      g.add(box);

      const red = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0x330000 })
      );
      red.position.set(2.1, 6.35, 0.29);
      g.add(red);

      const yellow = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0x332900 })
      );
      yellow.position.set(2.1, 6.05, 0.29);
      g.add(yellow);

      const green = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0x003300 })
      );
      green.position.set(2.1, 5.75, 0.29);
      g.add(green);

      g.position.set(x, 0, z);
      g.rotation.y = rotY;
      scene.add(g);

      return { group: g, red, yellow, green, isNS: Math.abs(rotY) < 0.01 || Math.abs(rotY - Math.PI) < 0.01 };
    }

    for (let ix = -6; ix <= 6; ix++) {
      for (let iz = -6; iz <= 6; iz++) {
        const x = ix * BLOCK;
        const z = iz * BLOCK;

        const inter = new THREE.Mesh(
          new THREE.BoxGeometry(ROAD_W, 0.16, ROAD_W),
          roadMat
        );
        inter.position.set(x, 0.055, z);
        roadGroup.add(inter);

        intersections.push({ x, z, size: 20 });

        lights.push(createTrafficLight(x - ROAD_HALF - 5, z - ROAD_HALF - 5, 0));
        lights.push(createTrafficLight(x + ROAD_HALF + 5, z + ROAD_HALF + 5, Math.PI));
        lights.push(createTrafficLight(x - ROAD_HALF - 5, z + ROAD_HALF + 5, Math.PI / 2));
        lights.push(createTrafficLight(x + ROAD_HALF + 5, z - ROAD_HALF - 5, -Math.PI / 2));
      }
    }

    function updateTrafficLights(dt) {
      lightState.timer += dt;
      if (lightState.timer > 7) {
        lightState.timer = 0;
        lightState.nsGreen = !lightState.nsGreen;
      }

      for (const l of lights) {
        const greenOn = l.isNS ? lightState.nsGreen : !lightState.nsGreen;
        l.red.material.color.setHex(greenOn ? 0x330000 : 0xff2020);
        l.yellow.material.color.setHex(0x332900);
        l.green.material.color.setHex(greenOn ? 0x20ff55 : 0x003300);
      }
    }

    // Buildings
    const buildingGroup = new THREE.Group();
    scene.add(buildingGroup);
    const colliders = [];

    function addBuilding(x, z, w, h, d, color) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshLambertMaterial({ color })
      );
      mesh.position.set(x, h / 2, z);
      buildingGroup.add(mesh);

      colliders.push({
        x, z,
        hw: w / 2 + 2.5,
        hd: d / 2 + 2.5
      });

      // rooftop block for variation
      if (h > 40 && Math.random() < 0.5) {
        const roof = new THREE.Mesh(
          new THREE.BoxGeometry(w * 0.45, h * 0.14, d * 0.45),
          new THREE.MeshLambertMaterial({ color: 0xd8d8d8 })
        );
        roof.position.set(x, h + (h * 0.14) / 2, z);
        buildingGroup.add(roof);
      }
    }

    const buildColors = [
      0x6f7883, 0x7f7267, 0x798692, 0x8a8078,
      0x5e707d, 0x7b6e6e, 0x6c7580, 0x87786b
    ];

    for (let gx = -7; gx < 7; gx++) {
      for (let gz = -7; gz < 7; gz++) {
        const cx = gx * BLOCK + BLOCK / 2;
        const cz = gz * BLOCK + BLOCK / 2;

        const spots = [
          [-24, -24], [24, -24], [-24, 24], [24, 24]
        ];

        for (let i = 0; i < spots.length; i++) {
          const sx = cx + spots[i][0];
          const sz = cz + spots[i][1];
          const w = 18 + Math.random() * 18;
          const d = 18 + Math.random() * 18;
          const h = 16 + Math.random() * 90;
          const col = buildColors[(Math.random() * buildColors.length) | 0];
          addBuilding(sx, sz, w, h, d, col);
        }
      }
    }

    // Small decorations
    const decoGroup = new THREE.Group();
    scene.add(decoGroup);

    function addTree(x, z) {
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.5, 0.7, 4, 6),
        new THREE.MeshLambertMaterial({ color: 0x714728 })
      );
      trunk.position.set(x, 2, z);
      decoGroup.add(trunk);

      const leaves = new THREE.Mesh(
        new THREE.SphereGeometry(2.6, 8, 8),
        new THREE.MeshLambertMaterial({ color: 0x2f8c3f })
      );
      leaves.position.set(x, 5, z);
      decoGroup.add(leaves);
    }

    for (let i = -6; i <= 6; i++) {
      for (let j = -6; j <= 6; j++) {
        addTree(i * BLOCK + 32, j * BLOCK + 28);
        addTree(i * BLOCK - 34, j * BLOCK + 22);
      }
    }

    // Jumps
    const jumps = [];
    function addJump(x, z, rotY) {
      const ramp = new THREE.Mesh(
        new THREE.BoxGeometry(18, 2.2, 9),
        new THREE.MeshLambertMaterial({ color: 0xc38a44 })
      );
      ramp.position.set(x, 1, z);
      ramp.rotation.y = rotY;
      ramp.rotation.x = -Math.PI / 8;
      scene.add(ramp);
      jumps.push({ x, z });
    }

    addJump(-300, -100, 0);
    addJump(200, 200, Math.PI / 2);
    addJump(-500, 300, Math.PI);
    addJump(420, -220, -Math.PI / 2);
    addJump(0, -500, Math.PI / 2);
    addJump(520, 100, 0);

    // Helper functions
    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

    function dist2(ax, az, bx, bz) {
      const dx = ax - bx, dz = az - bz;
      return dx * dx + dz * dz;
    }

    function isOnRoad(x, z) {
      for (let i = 0; i < ROAD_POSITIONS.length; i++) {
        const r = ROAD_POSITIONS[i];
        if (Math.abs(z - r) <= ROAD_HALF) return true;
        if (Math.abs(x - r) <= ROAD_HALF) return true;
      }
      return false;
    }

    function getNearestIntersection(x, z) {
      let best = null;
      let bestD = 1e9;
      for (let i = 0; i < intersections.length; i++) {
        const it = intersections[i];
        const d = dist2(x, z, it.x, it.z);
        if (d < bestD) {
          bestD = d;
          best = it;
        }
      }
      return best;
    }

    function getLaneDirAtPoint(x, z) {
      for (let i = 0; i < ROAD_POSITIONS.length; i++) {
        const r = ROAD_POSITIONS[i];
        if (Math.abs(z - r) < 7) return { axis: "x", forwardPositive: true };
        if (Math.abs(x - r) < 7) return { axis: "z", forwardPositive: true };
      }
      return null;
    }

    // Player car
    const player = new THREE.Group();
    scene.add(player);

    let playerBody;
    let hoodPlane;
    const playerWheels = [];

    function applyPlayerTexture() {
      if (!carTex) return;
      playerBody.material = [
        new THREE.MeshLambertMaterial({ map: carTex }),
        new THREE.MeshLambertMaterial({ map: carTex }),
        new THREE.MeshLambertMaterial({ map: carTex }),
        new THREE.MeshLambertMaterial({ map: carTex }),
        new THREE.MeshLambertMaterial({ map: carTex }),
        new THREE.MeshLambertMaterial({ map: carTex })
      ];
      hoodPlane.material = new THREE.MeshLambertMaterial({ map: carTex });
    }

    function createCarMesh(color, isPlayer, isPolice) {
      const g = new THREE.Group();

      const bodyMat = isPlayer
        ? new THREE.MeshLambertMaterial({ color: 0xe5e5e5 })
        : new THREE.MeshLambertMaterial({ color });

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(4.6, 1.35, 8.8),
        isPlayer ? [bodyMat, bodyMat, bodyMat, bodyMat, bodyMat, bodyMat] : bodyMat
      );
      body.position.y = 1.5;
      g.add(body);

      const cabin = new THREE.Mesh(
        new THREE.BoxGeometry(3, 1.05, 3.4),
        new THREE.MeshLambertMaterial({
          color: isPolice ? 0xaed4ff : 0x9bc8ff,
          transparent: true,
          opacity: 0.75
        })
      );
      cabin.position.set(0, 2.35, -0.2);
      g.add(cabin);

      if (isPlayer) {
        const hood = new THREE.Mesh(
          new THREE.PlaneGeometry(3.8, 3.6),
          new THREE.MeshLambertMaterial({ color: 0xffffff })
        );
        hood.rotation.x = -Math.PI / 2;
        hood.position.set(0, 2.2, 1.0);
        g.add(hood);
        hoodPlane = hood;
        playerBody = body;
      }

      if (isPolice) {
        const lightbarBase = new THREE.Mesh(
          new THREE.BoxGeometry(1.8, 0.18, 0.5),
          new THREE.MeshLambertMaterial({ color: 0x222222 })
        );
        lightbarBase.position.set(0, 2.95, -0.1);
        g.add(lightbarBase);

        const lr = new THREE.Mesh(
          new THREE.BoxGeometry(0.7, 0.24, 0.35),
          new THREE.MeshBasicMaterial({ color: 0xaa0000 })
        );
        lr.position.set(-0.45, 3.1, -0.1);
        g.add(lr);

        const lb = new THREE.Mesh(
          new THREE.BoxGeometry(0.7, 0.24, 0.35),
          new THREE.MeshBasicMaterial({ color: 0x0033aa })
        );
        lb.position.set(0.45, 3.1, -0.1);
        g.add(lb);

        g.userData.redLight = lr;
        g.userData.blueLight = lb;
      }

      const wheelGeo = new THREE.CylinderGeometry(0.95, 0.95, 0.75, 12);
      const wheelMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
      const wheelOffsets = [
        [-2.1, 0.95, 2.7], [2.1, 0.95, 2.7],
        [-2.1, 0.95, -2.7], [2.1, 0.95, -2.7]
      ];
      const wheels = [];
      for (let i = 0; i < wheelOffsets.length; i++) {
        const o = wheelOffsets[i];
        const w = new THREE.Mesh(wheelGeo, wheelMat);
        w.rotation.z = Math.PI / 2;
        w.position.set(o[0], o[1], o[2]);
        g.add(w);
        wheels.push(w);
      }
      g.userData.wheels = wheels;
      return g;
    }

    player.add(createCarMesh(0xffffff, true, false));
    if (carTex) applyPlayerTexture();

    // Traffic cars
    const trafficCars = [];
    const trafficColors = [0xff4040, 0x4488ff, 0xffffff, 0x111111, 0xffcc33, 0x66dd66, 0xbb66ff];
    const trafficLanes = [];

    function buildTrafficLanes() {
      for (let i = 0; i < ROAD_POSITIONS.length; i++) {
        const r = ROAD_POSITIONS[i];
        trafficLanes.push({ axis: "x", coord: r - 6, dir: 1, min: -HALF + 25, max: HALF - 25 });
        trafficLanes.push({ axis: "x", coord: r + 6, dir: -1, min: -HALF + 25, max: HALF - 25 });
        trafficLanes.push({ axis: "z", coord: r - 6, dir: -1, min: -HALF + 25, max: HALF - 25 });
        trafficLanes.push({ axis: "z", coord: r + 6, dir: 1, min: -HALF + 25, max: HALF - 25 });
      }
    }
    buildTrafficLanes();

    function createTrafficCar() {
      const color = trafficColors[(Math.random() * trafficColors.length) | 0];
      const lane = trafficLanes[(Math.random() * trafficLanes.length) | 0];
      const car = createCarMesh(color, false, false);
      scene.add(car);

      const t = lane.min + Math.random() * (lane.max - lane.min);
      const spd = 0.28 + Math.random() * 0.28;
      return { mesh: car, lane, t, speed: spd, wait: 0 };
    }

    for (let i = 0; i < 32; i++) trafficCars.push(createTrafficCar());
    trafficCountEl.textContent = trafficCars.length;

    // Police cars
    const policeCars = [];

    function spawnPoliceNearPlayer() {
      if (policeCars.length >= 6) return;

      const ang = Math.random() * Math.PI * 2;
      const dist = 120 + Math.random() * 90;
      let x = playerState.x + Math.cos(ang) * dist;
      let z = playerState.z + Math.sin(ang) * dist;

      // snap to road
      let bestRX = ROAD_POSITIONS[0], bestRZ = ROAD_POSITIONS[0];
      let dxBest = 1e9, dzBest = 1e9;
      for (let i = 0; i < ROAD_POSITIONS.length; i++) {
        const r = ROAD_POSITIONS[i];
        const dx = Math.abs(x - r);
        const dz = Math.abs(z - r);
        if (dx < dxBest) { dxBest = dx; bestRX = r; }
        if (dz < dzBest) { dzBest = dz; bestRZ = r; }
      }
      if (dxBest < dzBest) x = bestRX + (Math.random() < 0.5 ? -6 : 6);
      else z = bestRZ + (Math.random() < 0.5 ? -6 : 6);

      const mesh = createCarMesh(0xffffff, false, true);
      scene.add(mesh);

      policeCars.push({
        mesh,
        x, z,
        y: 0.45,
        yaw: 0,
        speed: 0,
        blink: 0
      });

      policeCountEl.textContent = policeCars.length;
      showMsg("POLICE!");
    }

    // Player state
    const keys = {};
    let cameraMode = 0;
    let wanted = 0;
    let policeHits = 0;
    let jumpCount = 0;
    let lastOffenseTime = 0;
    let lastCrashTime = 0;
    let lastHitTime = 0;
    let prevNearIntersection = false;

    const playerState = {
      x: 0,
      z: 0,
      y: 0.45,
      yaw: 0,
      speed: 0,
      verticalVel: 0,
      grounded: true,
      reset() {
        this.x = 0;
        this.z = 0;
        this.y = 0.45;
        this.yaw = 0;
        this.speed = 0;
        this.verticalVel = 0;
        this.grounded = true;
        wanted = 0;
        policeHits = 0;
        policeCars.forEach(p => scene.remove(p.mesh));
        policeCars.length = 0;
        wantedEl.textContent = wanted;
        hitsEl.textContent = policeHits;
        policeCountEl.textContent = policeCars.length;
        player.position.set(this.x, this.y, this.z);
        player.rotation.set(0, this.yaw, 0);
      }
    };
    playerState.reset();

    function increaseWanted(amount) {
      wanted = clamp(wanted + amount, 0, 5);
      wantedEl.textContent = wanted;
      if (wanted >= 1 && policeCars.length < Math.min(2 + wanted, 6)) {
        spawnPoliceNearPlayer();
      }
    }

    function handleRedLightCrime(now) {
      if (now - lastOffenseTime < 1500) return;
      lastOffenseTime = now;
      increaseWanted(1);
      showMsg("RED LIGHT!");
    }

    function handleCrashCrime(now) {
      if (now - lastCrashTime < 1200) return;
      lastCrashTime = now;
      increaseWanted(1);
      showMsg("HIT AND RUN!");
    }

    function checkPlayerVsBuildings(prevX, prevZ) {
      for (let i = 0; i < colliders.length; i++) {
        const c = colliders[i];
        if (
          Math.abs(playerState.x - c.x) < c.hw + 2.5 &&
          Math.abs(playerState.z - c.z) < c.hd + 2.5
        ) {
          playerState.x = prevX;
          playerState.z = prevZ;
          playerState.speed *= -0.18;
          showMsg("CRASH!");
          return true;
        }
      }
      return false;
    }

    function updateTraffic(dt, now) {
      const nsGreen = lightState.nsGreen;

      for (let i = 0; i < trafficCars.length; i++) {
        const c = trafficCars[i];
        const lane = c.lane;

        let mustStop = false;
        if (lane.axis === "x") {
          for (let j = 0; j < ROAD_POSITIONS.length; j++) {
            const ix = ROAD_POSITIONS[j];
            const diff = ix - c.t;
            const movingToward = lane.dir > 0 ? diff > 0 && diff < 14 : diff < 0 && diff > -14;
            if (movingToward) {
              const green = !nsGreen;
              if (!green) mustStop = true;
              break;
            }
          }
        } else {
          for (let j = 0; j < ROAD_POSITIONS.length; j++) {
            const iz = ROAD_POSITIONS[j];
            const diff = iz - c.t;
            const movingToward = lane.dir > 0 ? diff > 0 && diff < 14 : diff < 0 && diff > -14;
            if (movingToward) {
              const green = nsGreen;
              if (!green) mustStop = true;
              break;
            }
          }
        }

        let move = mustStop ? Math.max(c.speed * 0.15, 0.02) : c.speed;
        c.t += move * lane.dir * 60 * dt;

        if (c.t > lane.max) c.t = lane.min;
        if (c.t < lane.min) c.t = lane.max;

        if (lane.axis === "x") {
          c.mesh.position.set(c.t, 0.45, lane.coord);
          c.mesh.rotation.y = lane.dir > 0 ? Math.PI / 2 : -Math.PI / 2;
        } else {
          c.mesh.position.set(lane.coord, 0.45, c.t);
          c.mesh.rotation.y = lane.dir > 0 ? 0 : Math.PI;
        }

        const dx = playerState.x - c.mesh.position.x;
        const dz = playerState.z - c.mesh.position.z;
        if (dx * dx + dz * dz < 36) {
          playerState.speed *= -0.22;
          playerState.x += dx * 0.18;
          playerState.z += dz * 0.18;
          handleCrashCrime(now);
        }

        const wheels = c.mesh.userData.wheels;
        for (let w = 0; w < wheels.length; w++) {
          wheels[w].rotation.x -= move * 0.12;
        }
      }
    }

    function updatePolice(dt, now) {
      for (let i = 0; i < policeCars.length; i++) {
        const p = policeCars[i];
        const dx = playerState.x - p.x;
        const dz = playerState.z - p.z;
        const targetYaw = Math.atan2(dx, dz);

        let da = targetYaw - p.yaw;
        while (da > Math.PI) da -= Math.PI * 2;
        while (da < -Math.PI) da += Math.PI * 2;

        p.yaw += da * 0.06;
        p.speed += (0.72 + wanted * 0.08 - p.speed) * 0.03;

        p.x += Math.sin(p.yaw) * p.speed * 60 * dt;
        p.z += Math.cos(p.yaw) * p.speed * 60 * dt;

        p.x = clamp(p.x, -HALF + 10, HALF - 10);
        p.z = clamp(p.z, -HALF + 10, HALF - 10);

        p.mesh.position.set(p.x, p.y, p.z);
        p.mesh.rotation.y = p.yaw;

        p.blink += dt * 10;
        const on = (p.blink % 1) < 0.5;
        p.mesh.userData.redLight.material.color.setHex(on ? 0xff2222 : 0x440000);
        p.mesh.userData.blueLight.material.color.setHex(on ? 0x2266ff : 0x000044);

        const d2 = dist2(playerState.x, playerState.z, p.x, p.z);
        if (d2 < 49 && now - lastHitTime > 900) {
          lastHitTime = now;
          policeHits++;
          hitsEl.textContent = policeHits;
          playerState.speed *= -0.25;
          showMsg("POLICE HIT!");
          if (policeHits >= 5) {
            showMsg("BUSTED", 1400);
            setTimeout(() => playerState.reset(), 900);
          }
        }
      }
    }

    function updateWantedDecay(dt) {
      if (wanted > 0) {
        const closePolice = policeCars.some(p => dist2(playerState.x, playerState.z, p.x, p.z) < 220 * 220);
        if (!closePolice) {
          updateWantedDecay.acc = (updateWantedDecay.acc || 0) + dt;
          if (updateWantedDecay.acc > 12) {
            updateWantedDecay.acc = 0;
            wanted--;
            wantedEl.textContent = wanted;
            if (wanted === 0) {
              policeCars.forEach(p => scene.remove(p.mesh));
              policeCars.length = 0;
              policeCountEl.textContent = policeCars.length;
              showMsg("ESCAPED");
            }
          }
        } else {
          updateWantedDecay.acc = 0;
        }
      } else {
        updateWantedDecay.acc = 0;
      }
    }

    window.addEventListener("keydown", (e) => {
      const k = e.key.toLowerCase();
      keys[k] = true;
      if (k === "r") playerState.reset();
      if (k === "c") cameraMode = (cameraMode + 1) % 3;
    });

    window.addEventListener("keyup", (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.033);
      const now = performance.now();

      updateTrafficLights(dt);

      const forward = keys["w"] || keys["arrowup"];
      const backward = keys["s"] || keys["arrowdown"];
      const left = keys["a"] || keys["arrowleft"];
      const right = keys["d"] || keys["arrowright"];
      const handbrake = keys[" "];

      if (forward) playerState.speed += 0.07;
      if (backward) playerState.speed -= 0.055;

      playerState.speed *= playerState.grounded ? 0.985 : 0.992;
      if (handbrake) playerState.speed *= 0.965;
      playerState.speed = clamp(playerState.speed, -0.55, 1.35);

      const steer = playerState.grounded
        ? 0.019 + Math.min(Math.abs(playerState.speed) * 0.018, 0.04)
        : 0.007;

      if (left) playerState.yaw += steer * (playerState.speed >= 0 ? 1 : -1);
      if (right) playerState.yaw -= steer * (playerState.speed >= 0 ? 1 : -1);

      const prevX = playerState.x;
      const prevZ = playerState.z;

      playerState.x += Math.sin(playerState.yaw) * playerState.speed * 2.2;
      playerState.z += Math.cos(playerState.yaw) * playerState.speed * 2.2;

      playerState.x = clamp(playerState.x, -HALF + 10, HALF - 10);
      playerState.z = clamp(playerState.z, -HALF + 10, HALF - 10);

      if (!playerState.grounded) {
        playerState.verticalVel -= 0.025;
        playerState.y += playerState.verticalVel * 4.4;
        if (playerState.y <= 0.45) {
          playerState.y = 0.45;
          playerState.grounded = true;
          playerState.verticalVel = 0;
        }
      }

      if (!isOnRoad(playerState.x, playerState.z)) {
        playerState.speed *= 0.972;
      }

      checkPlayerVsBuildings(prevX, prevZ);

      // jumps
      for (let i = 0; i < jumps.length; i++) {
        const j = jumps[i];
        if (dist2(playerState.x, playerState.z, j.x, j.z) < 90 && playerState.grounded && playerState.speed > 0.35) {
          playerState.verticalVel = 0.46 + Math.min(playerState.speed * 0.16, 0.18);
          playerState.grounded = false;
          jumpCount++;
          showMsg("JUMP!");
          break;
        }
      }

      // traffic light crime
      const nearest = getNearestIntersection(playerState.x, playerState.z);
      const nearIntersection = nearest && dist2(playerState.x, playerState.z, nearest.x, nearest.z) < 18 * 18;
      const laneDir = getLaneDirAtPoint(playerState.x, playerState.z);

      if (nearIntersection && !prevNearIntersection && Math.abs(playerState.speed) > 0.62 && laneDir) {
        let isRedForPlayer = false;
        if (laneDir.axis === "z") isRedForPlayer = !lightState.nsGreen;
        if (laneDir.axis === "x") isRedForPlayer = lightState.nsGreen;
        if (isRedForPlayer) handleRedLightCrime(now);
      }
      prevNearIntersection = nearIntersection;

      updateTraffic(dt, now);
      updatePolice(dt, now);
      updateWantedDecay(dt);

      player.position.set(playerState.x, playerState.y, playerState.z);
      player.rotation.y = playerState.yaw;

      const targetRoll = (left ? -0.1 : 0) + (right ? 0.1 : 0);
      player.rotation.z += (targetRoll - player.rotation.z) * 0.08;

      const targetPitch = playerState.grounded ? -playerState.speed * 0.08 : -0.18;
      player.rotation.x += (targetPitch - player.rotation.x) * 0.08;

      for (let i = 0; i < player.children.length; i++) {
        const wheels = player.children[i].userData.wheels;
        if (wheels) {
          for (let w = 0; w < wheels.length; w++) wheels[w].rotation.x -= playerState.speed * 0.18;
        }
      }

      // camera
      if (cameraMode === 0) {
        const back = new THREE.Vector3(Math.sin(playerState.yaw), 0.2, Math.cos(playerState.yaw)).multiplyScalar(-20);
        const target = new THREE.Vector3(playerState.x, playerState.y + 8, playerState.z).add(back);
        camera.position.lerp(target, 0.09);
        camera.lookAt(playerState.x, playerState.y + 2.4, playerState.z);
      } else if (cameraMode === 1) {
        const side = new THREE.Vector3(Math.cos(playerState.yaw) * 12, 6, -Math.sin(playerState.yaw) * 12);
        const target = new THREE.Vector3(playerState.x, playerState.y + 2, playerState.z).add(side);
        camera.position.lerp(target, 0.09);
        camera.lookAt(playerState.x, playerState.y + 1.6, playerState.z);
      } else {
        const target = new THREE.Vector3(playerState.x, playerState.y + 36, playerState.z + 0.01);
        camera.position.lerp(target, 0.08);
        camera.lookAt(playerState.x, playerState.y, playerState.z);
      }

      // HUD
      speedEl.textContent = Math.round(Math.abs(playerState.speed) * 150);
      lightEl.textContent = lightState.nsGreen ? "NS green / EW red" : "EW green / NS red";

      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    setTimeout(() => {
      if (carTex && playerBody) applyPlayerTexture();
    }, 1000);

    loading.style.display = "none";
    animate();
  </script>
</body>
</html>
