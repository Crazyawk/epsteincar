<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Big City Police Chase</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(#6db7ff 0%, #9fd4ff 45%, #dff2ff 100%);
      font-family: Arial, sans-serif;
    }
    canvas { display: block; }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 20;
      color: white;
      background: rgba(0,0,0,0.38);
      border-radius: 12px;
      padding: 10px 12px;
      line-height: 1.35;
      font-size: 13px;
      max-width: 320px;
      backdrop-filter: blur(4px);
    }

    #msg {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 38px;
      font-weight: bold;
      text-shadow: 0 2px 14px rgba(0,0,0,0.75);
      opacity: 0;
      transition: opacity .18s;
      z-index: 60;
      pointer-events: none;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: linear-gradient(#69bdfc, #3f79d1);
      color: white;
      font-size: 26px;
    }

    #minimapWrap {
      position: absolute;
      right: 12px;
      top: 12px;
      width: 200px;
      height: 200px;
      border-radius: 14px;
      overflow: hidden;
      z-index: 30;
      background: rgba(0,0,0,0.34);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
    }

    #minimap {
      width: 200px;
      height: 200px;
      display: block;
    }

    #bustedFlash {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 80;
      opacity: 0;
      background: black;
    }
  </style>
</head>
<body>
  <div id="loading">Loading upgraded city...</div>

  <div id="hud">
    <div><b>Big City Police Chase</b></div>
    <div>W / ↑ drive</div>
    <div>S / ↓ brake / reverse</div>
    <div>A / D steer</div>
    <div>Space handbrake</div>
    <div>R reset</div>
    <div>C camera</div>
    <hr style="border-color: rgba(255,255,255,0.2);">
    <div>Speed: <span id="speed">0</span></div>
    <div>Wanted: <span id="wanted">0</span></div>
    <div>Police hits: <span id="hits">0</span>/20</div>
    <div>Traffic light: <span id="light">-</span></div>
    <div>Traffic cars: <span id="trafficCount">0</span></div>
    <div>Police cars: <span id="policeCount">0</span></div>
  </div>

  <div id="minimapWrap">
    <canvas id="minimap" width="200" height="200"></canvas>
  </div>

  <div id="msg">BUSTED</div>
  <div id="bustedFlash"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    const loading = document.getElementById("loading");
    const speedEl = document.getElementById("speed");
    const wantedEl = document.getElementById("wanted");
    const hitsEl = document.getElementById("hits");
    const lightEl = document.getElementById("light");
    const trafficCountEl = document.getElementById("trafficCount");
    const policeCountEl = document.getElementById("policeCount");
    const msgEl = document.getElementById("msg");
    const bustedFlash = document.getElementById("bustedFlash");
    const minimap = document.getElementById("minimap");
    const mm = minimap.getContext("2d");

    const CAR_IMAGE = "https://iili.io/qaxWCzX.jpg";

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xbddfff, 350, 2200);

    const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 3500);
    const renderer = new THREE.WebGLRenderer({
      antialias: false,
      powerPreference: "high-performance"
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.4));
    renderer.shadowMap.enabled = false;
    renderer.setClearColor(0x9fd7ff, 1);
    document.body.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0xffffff, 0x6b8e57, 1.22);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xffffff, 0.82);
    sun.position.set(180, 260, 130);
    scene.add(sun);

    const WORLD_SIZE = 2600;
    const HALF = WORLD_SIZE / 2;
    const BLOCK = 120;
    const ROAD_W = 34;
    const ROAD_HALF = ROAD_W / 2;
    const ROAD_POSITIONS = [];
    for (let i = -8; i <= 8; i++) ROAD_POSITIONS.push(i * BLOCK);

    const texLoader = new THREE.TextureLoader();
    texLoader.crossOrigin = "anonymous";
    let carTex = null;

    texLoader.load(
      CAR_IMAGE,
      (t) => {
        t.colorSpace = THREE.SRGBColorSpace;
        carTex = t;
        if (playerBody) applyPlayerTexture();
        refreshBillboards();
      },
      undefined,
      () => {}
    );

    function showMsg(text, ms = 900) {
      msgEl.textContent = text;
      msgEl.style.opacity = "1";
      clearTimeout(showMsg.t);
      showMsg.t = setTimeout(() => msgEl.style.opacity = "0", ms);
    }

    function flashBusted() {
      let n = 0;
      clearInterval(flashBusted.t);
      flashBusted.t = setInterval(() => {
        bustedFlash.style.opacity = (n % 2 === 0) ? "0.88" : "0";
        bustedFlash.style.background = (n % 4 < 2) ? "rgba(255,0,0,0.95)" : "rgba(0,0,0,1)";
        n++;
        if (n > 10) {
          clearInterval(flashBusted.t);
          bustedFlash.style.opacity = "0";
        }
      }, 75);
    }

    const lambert = (c) => new THREE.MeshLambertMaterial({ color: c });

    const grassMat = lambert(0x5da653);
    const roadMat = lambert(0x2c2c2e);
    const roadLineYellow = lambert(0xf0d96d);
    const roadLineWhite = lambert(0xf7f7f7);
    const sidewalkMat = lambert(0xa8a8ab);

    const worldGroup = new THREE.Group();
    scene.add(worldGroup);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(WORLD_SIZE * 2.2, WORLD_SIZE * 2.2),
      grassMat
    );
    ground.rotation.x = -Math.PI / 2;
    worldGroup.add(ground);

    // Decorative distant skyline blocks
    const farGroup = new THREE.Group();
    scene.add(farGroup);
    for (let i = 0; i < 70; i++) {
      const h = 60 + Math.random() * 220;
      const w = 30 + Math.random() * 40;
      const d = 30 + Math.random() * 40;
      const b = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        lambert([0x8b95a3,0x7f8896,0x9da8b5][(Math.random()*3)|0])
      );
      const ang = Math.random() * Math.PI * 2;
      const r = 1200 + Math.random() * 900;
      b.position.set(Math.cos(ang) * r, h / 2, Math.sin(ang) * r);
      farGroup.add(b);
    }

    // Roads
    const roadGroup = new THREE.Group();
    scene.add(roadGroup);

    function addRoadX(z) {
      const road = new THREE.Mesh(
        new THREE.BoxGeometry(WORLD_SIZE, 0.16, ROAD_W),
        roadMat
      );
      road.position.set(0, 0.05, z);
      roadGroup.add(road);

      const s1 = new THREE.Mesh(
        new THREE.BoxGeometry(WORLD_SIZE, 0.1, 8),
        sidewalkMat
      );
      s1.position.set(0, 0.09, z - ROAD_HALF - 4);
      roadGroup.add(s1);

      const s2 = s1.clone();
      s2.position.z = z + ROAD_HALF + 4;
      roadGroup.add(s2);

      for (let x = -HALF + 25; x < HALF - 25; x += 36) {
        const dash = new THREE.Mesh(
          new THREE.BoxGeometry(17, 0.04, 0.95),
          roadLineYellow
        );
        dash.position.set(x, 0.13, z);
        roadGroup.add(dash);
      }

      for (let x = -HALF + 20; x < HALF - 20; x += 28) {
        const e1 = new THREE.Mesh(
          new THREE.BoxGeometry(12, 0.03, 0.35),
          roadLineWhite
        );
        e1.position.set(x, 0.12, z - ROAD_HALF + 1.5);
        roadGroup.add(e1);

        const e2 = e1.clone();
        e2.position.z = z + ROAD_HALF - 1.5;
        roadGroup.add(e2);
      }
    }

    function addRoadZ(x) {
      const road = new THREE.Mesh(
        new THREE.BoxGeometry(ROAD_W, 0.16, WORLD_SIZE),
        roadMat
      );
      road.position.set(x, 0.05, 0);
      roadGroup.add(road);

      const s1 = new THREE.Mesh(
        new THREE.BoxGeometry(8, 0.1, WORLD_SIZE),
        sidewalkMat
      );
      s1.position.set(x - ROAD_HALF - 4, 0.09, 0);
      roadGroup.add(s1);

      const s2 = s1.clone();
      s2.position.x = x + ROAD_HALF + 4;
      roadGroup.add(s2);

      for (let z = -HALF + 25; z < HALF - 25; z += 36) {
        const dash = new THREE.Mesh(
          new THREE.BoxGeometry(0.95, 0.04, 17),
          roadLineYellow
        );
        dash.position.set(x, 0.13, z);
        roadGroup.add(dash);
      }

      for (let z = -HALF + 20; z < HALF - 20; z += 28) {
        const e1 = new THREE.Mesh(
          new THREE.BoxGeometry(0.35, 0.03, 12),
          roadLineWhite
        );
        e1.position.set(x - ROAD_HALF + 1.5, 0.12, z);
        roadGroup.add(e1);

        const e2 = e1.clone();
        e2.position.x = x + ROAD_HALF - 1.5;
        roadGroup.add(e2);
      }
    }

    ROAD_POSITIONS.forEach(addRoadX);
    ROAD_POSITIONS.forEach(addRoadZ);

    // Intersections + traffic lights
    const intersections = [];
    const lights = [];
    const lightState = { nsGreen: true, timer: 0 };

    function createTrafficLight(x, z, rotY, isNS) {
      const g = new THREE.Group();

      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18, 0.22, 8, 8),
        lambert(0x4a4a4a)
      );
      pole.position.y = 4;
      g.add(pole);

      const arm = new THREE.Mesh(
        new THREE.BoxGeometry(3.0, 0.18, 0.18),
        lambert(0x5a5a5a)
      );
      arm.position.set(1.4, 7.1, 0);
      g.add(arm);

      const box = new THREE.Mesh(
        new THREE.BoxGeometry(0.68, 1.55, 0.68),
        lambert(0x202020)
      );
      box.position.set(2.75, 6.7, 0);
      g.add(box);

      const red = new THREE.Mesh(
        new THREE.SphereGeometry(0.14, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0x330000 })
      );
      red.position.set(2.75, 7.05, 0.36);
      g.add(red);

      const yellow = new THREE.Mesh(
        new THREE.SphereGeometry(0.14, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0x332900 })
      );
      yellow.position.set(2.75, 6.7, 0.36);
      g.add(yellow);

      const green = new THREE.Mesh(
        new THREE.SphereGeometry(0.14, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0x003300 })
      );
      green.position.set(2.75, 6.35, 0.36);
      g.add(green);

      g.position.set(x, 0, z);
      g.rotation.y = rotY;
      scene.add(g);

      return { group: g, red, yellow, green, isNS };
    }

    for (let ix = -7; ix <= 7; ix++) {
      for (let iz = -7; iz <= 7; iz++) {
        const x = ix * BLOCK;
        const z = iz * BLOCK;

        const inter = new THREE.Mesh(
          new THREE.BoxGeometry(ROAD_W, 0.17, ROAD_W),
          roadMat
        );
        inter.position.set(x, 0.055, z);
        roadGroup.add(inter);

        intersections.push({ x, z, size: 24 });

        lights.push(createTrafficLight(x - ROAD_HALF - 6, z - ROAD_HALF - 6, 0, true));
        lights.push(createTrafficLight(x + ROAD_HALF + 6, z + ROAD_HALF + 6, Math.PI, true));
        lights.push(createTrafficLight(x - ROAD_HALF - 6, z + ROAD_HALF + 6, Math.PI / 2, false));
        lights.push(createTrafficLight(x + ROAD_HALF + 6, z - ROAD_HALF - 6, -Math.PI / 2, false));
      }
    }

    function updateTrafficLights(dt) {
      lightState.timer += dt;
      if (lightState.timer > 8) {
        lightState.timer = 0;
        lightState.nsGreen = !lightState.nsGreen;
      }

      for (const l of lights) {
        const greenOn = l.isNS ? lightState.nsGreen : !lightState.nsGreen;
        l.red.material.color.setHex(greenOn ? 0x330000 : 0xff2020);
        l.yellow.material.color.setHex(0x332900);
        l.green.material.color.setHex(greenOn ? 0x26ff5e : 0x003300);
      }
    }

    // Buildings / shops / stalls / billboards
    const colliders = [];
    const buildingGroup = new THREE.Group();
    scene.add(buildingGroup);

    const billboardPlanes = [];

    function addCollider(x, z, hw, hd) {
      colliders.push({ x, z, hw, hd });
    }

    function addBuilding(x, z, w, h, d, color) {
      const b = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        lambert(color)
      );
      b.position.set(x, h / 2, z);
      buildingGroup.add(b);

      // simple windows
      const rows = Math.max(2, Math.floor(h / 12));
      const cols = Math.max(2, Math.floor(w / 7));
      const frontWinMat = lambert([0x93bce8,0x7ca8d7,0xb3d7f7][(Math.random()*3)|0]);
      for (let ry = 0; ry < rows; ry++) {
        for (let cx = 0; cx < cols; cx++) {
          if (Math.random() < 0.15) continue;
          const win = new THREE.Mesh(
            new THREE.BoxGeometry(w / (cols + 2), 2.1, 0.28),
            frontWinMat
          );
          win.position.set(
            x - w/2 + ((cx + 1.5) * w / (cols + 1)),
            5 + ry * ((h - 10) / rows),
            z + d/2 + 0.16
          );
          buildingGroup.add(win);
        }
      }

      if (h > 60 && Math.random() < 0.45) {
        const roof = new THREE.Mesh(
          new THREE.BoxGeometry(w * 0.42, h * 0.12, d * 0.42),
          lambert(0xd5d5d5)
        );
        roof.position.set(x, h + (h * 0.12)/2, z);
        buildingGroup.add(roof);
      }

      addCollider(x, z, w/2 + 1.0, d/2 + 1.0);
    }

    function addShop(x, z, w, d, color) {
      const baseH = 10 + Math.random() * 5;

      const shop = new THREE.Mesh(
        new THREE.BoxGeometry(w, baseH, d),
        lambert(color)
      );
      shop.position.set(x, baseH / 2, z);
      buildingGroup.add(shop);

      const front = new THREE.Mesh(
        new THREE.BoxGeometry(w * 0.78, 3.4, 0.2),
        lambert(0x7fc0ef)
      );
      front.position.set(x, 3.6, z + d/2 + 0.13);
      buildingGroup.add(front);

      const awning = new THREE.Mesh(
        new THREE.BoxGeometry(w * 0.9, 0.7, 2.2),
        lambert([0xd64c4c,0x3b7ddb,0x49a54d,0xe5a62d][(Math.random()*4)|0])
      );
      awning.position.set(x, 6.5, z + d/2 + 0.8);
      buildingGroup.add(awning);

      addCollider(x, z, w/2 + 0.8, d/2 + 0.8);
    }

    function addTent(x, z) {
      const poleMat = lambert(0x7b5a38);
      const clothColor = [0xd44a4a, 0x3d7edb, 0xf0ba35, 0x44a85b][(Math.random()*4)|0];

      const table = new THREE.Mesh(
        new THREE.BoxGeometry(8, 1.2, 5),
        lambert(0x8d6b4a)
      );
      table.position.set(x, 1.2, z);
      buildingGroup.add(table);

      const roof = new THREE.Mesh(
        new THREE.ConeGeometry(6, 3.6, 4),
        lambert(clothColor)
      );
      roof.position.set(x, 4.5, z);
      roof.rotation.y = Math.PI / 4;
      buildingGroup.add(roof);

      const polePositions = [
        [-3.3, -2.0], [3.3, -2.0], [-3.3, 2.0], [3.3, 2.0]
      ];
      for (const p of polePositions) {
        const pole = new THREE.Mesh(
          new THREE.CylinderGeometry(0.12, 0.12, 3.6, 6),
          poleMat
        );
        pole.position.set(x + p[0], 2.1, z + p[1]);
        buildingGroup.add(pole);
      }

      addCollider(x, z, 4.5, 3.2);
    }

    function addBillboard(x, z, rotY) {
      const pole1 = new THREE.Mesh(
        new THREE.CylinderGeometry(0.42, 0.52, 12, 8),
        lambert(0x777777)
      );
      const pole2 = pole1.clone();
      pole1.position.set(x - Math.cos(rotY) * 6, 6, z - Math.sin(rotY) * 6);
      pole2.position.set(x + Math.cos(rotY) * 6, 6, z + Math.sin(rotY) * 6);
      scene.add(pole1, pole2);

      const mat = carTex
        ? new THREE.MeshLambertMaterial({ map: carTex })
        : lambert(0xffffff);

      const board = new THREE.Mesh(
        new THREE.PlaneGeometry(22, 11),
        mat
      );
      board.position.set(x, 14, z);
      board.rotation.y = rotY;
      scene.add(board);
      billboardPlanes.push(board);
    }

    function refreshBillboards() {
      if (!carTex) return;
      for (const b of billboardPlanes) {
        b.material = new THREE.MeshLambertMaterial({ map: carTex });
      }
    }

    const buildingColors = [0x6f7883,0x7e7168,0x79848f,0x8c8077,0x66727d,0x807171];
    for (let gx = -8; gx < 8; gx++) {
      for (let gz = -8; gz < 8; gz++) {
        const centerX = gx * BLOCK + BLOCK / 2;
        const centerZ = gz * BLOCK + BLOCK / 2;

        const isDense = Math.abs(gx) < 5 && Math.abs(gz) < 5;
        const spots = [
          [-30, -30], [30, -30], [-30, 30], [30, 30]
        ];

        for (let i = 0; i < spots.length; i++) {
          const sx = centerX + spots[i][0];
          const sz = centerZ + spots[i][1];

          if (Math.random() < 0.22) {
            addShop(sx, sz, 18 + Math.random() * 10, 16 + Math.random() * 8, buildingColors[(Math.random()*buildingColors.length)|0]);
          } else {
            addBuilding(
              sx, sz,
              22 + Math.random() * 18,
              (isDense ? 50 : 20) + Math.random() * (isDense ? 130 : 70),
              22 + Math.random() * 18,
              buildingColors[(Math.random()*buildingColors.length)|0]
            );
          }
        }

        if (Math.random() < 0.20) addTent(centerX, centerZ);
      }
    }

    addBillboard(-700, -70, Math.PI / 2);
    addBillboard(700, 90, -Math.PI / 2);
    addBillboard(60, -760, 0);
    addBillboard(-90, 760, Math.PI);
    addBillboard(-950, 340, Math.PI / 2);
    addBillboard(980, -280, -Math.PI / 2);

    // Trees
    const decoGroup = new THREE.Group();
    scene.add(decoGroup);

    function addTree(x, z) {
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.45, 0.6, 4, 6),
        lambert(0x74492a)
      );
      trunk.position.set(x, 2, z);
      decoGroup.add(trunk);

      const leaves = new THREE.Mesh(
        new THREE.SphereGeometry(2.8, 8, 8),
        lambert(0x2d8b3f)
      );
      leaves.position.set(x, 5, z);
      decoGroup.add(leaves);
    }

    for (let i = -7; i <= 7; i++) {
      for (let j = -7; j <= 7; j++) {
        addTree(i * BLOCK + 40, j * BLOCK + 36);
        addTree(i * BLOCK - 42, j * BLOCK + 24);
      }
    }

    // Ramps
    const jumps = [];
    function addJump(x, z, rotY) {
      const ramp = new THREE.Mesh(
        new THREE.BoxGeometry(22, 2.5, 10),
        lambert(0xc58a44)
      );
      ramp.position.set(x, 1.1, z);
      ramp.rotation.y = rotY;
      ramp.rotation.x = -Math.PI / 8;
      scene.add(ramp);
      jumps.push({ x, z });
    }

    addJump(-320, -120, 0);
    addJump(240, 240, Math.PI / 2);
    addJump(-560, 360, Math.PI);
    addJump(520, -280, -Math.PI / 2);
    addJump(0, -620, Math.PI / 2);
    addJump(680, 100, 0);
    addJump(-820, -420, Math.PI);

    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
    function dist2(ax, az, bx, bz) {
      const dx = ax - bx, dz = az - bz;
      return dx * dx + dz * dz;
    }

    function isOnRoad(x, z) {
      for (let i = 0; i < ROAD_POSITIONS.length; i++) {
        const r = ROAD_POSITIONS[i];
        if (Math.abs(z - r) <= ROAD_HALF) return true;
        if (Math.abs(x - r) <= ROAD_HALF) return true;
      }
      return false;
    }

    function getNearestIntersection(x, z) {
      let best = null, bestD = 1e18;
      for (const it of intersections) {
        const d = dist2(x, z, it.x, it.z);
        if (d < bestD) { bestD = d; best = it; }
      }
      return best;
    }

    function getLaneDirAtPoint(x, z) {
      for (let i = 0; i < ROAD_POSITIONS.length; i++) {
        const r = ROAD_POSITIONS[i];
        if (Math.abs(z - r) < 8) return { axis: "x" };
        if (Math.abs(x - r) < 8) return { axis: "z" };
      }
      return null;
    }

    // Player car
    const player = new THREE.Group();
    scene.add(player);

    let playerBody, hoodPlane;
    let playerWheelFL, playerWheelFR, playerWheelRL, playerWheelRR;

    function applyPlayerTexture() {
      if (!carTex) return;
      const mats = [];
      for (let i = 0; i < 6; i++) mats.push(new THREE.MeshLambertMaterial({ map: carTex }));
      playerBody.material = mats;
      hoodPlane.material = new THREE.MeshLambertMaterial({ map: carTex });
    }

    function createCarMesh(color, isPlayer, isPolice) {
      const g = new THREE.Group();

      const bodyMat = isPlayer ? lambert(0xe8e8e8) : lambert(color);

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(4.8, 1.3, 9.2),
        isPlayer ? [bodyMat, bodyMat, bodyMat, bodyMat, bodyMat, bodyMat] : bodyMat
      );
      body.position.y = 1.45;
      g.add(body);

      const hood = new THREE.Mesh(
        new THREE.BoxGeometry(4.4, 0.65, 2.7),
        isPlayer ? lambert(0xffffff) : lambert(color)
      );
      hood.position.set(0, 1.85, 1.95);
      g.add(hood);

      const cabin = new THREE.Mesh(
        new THREE.BoxGeometry(3.1, 1.0, 3.8),
        new THREE.MeshLambertMaterial({
          color: isPolice ? 0xa9d1ff : 0x9ac6f5,
          transparent: true,
          opacity: 0.74
        })
      );
      cabin.position.set(0, 2.35, -0.25);
      g.add(cabin);

      const rear = new THREE.Mesh(
        new THREE.BoxGeometry(4.2, 0.7, 2.0),
        isPlayer ? lambert(0xffffff) : lambert(color)
      );
      rear.position.set(0, 1.85, -2.85);
      g.add(rear);

      if (isPlayer) {
        const hp = new THREE.Mesh(
          new THREE.PlaneGeometry(3.8, 3.2),
          lambert(0xffffff)
        );
        hp.rotation.x = -Math.PI / 2;
        hp.position.set(0, 2.19, 1.4);
        g.add(hp);
        hoodPlane = hp;
        playerBody = body;
      }

      if (isPolice) {
        const barBase = new THREE.Mesh(
          new THREE.BoxGeometry(2.0, 0.14, 0.5),
          lambert(0x222222)
        );
        barBase.position.set(0, 2.98, -0.1);
        g.add(barBase);

        const red = new THREE.Mesh(
          new THREE.BoxGeometry(0.78, 0.22, 0.32),
          new THREE.MeshBasicMaterial({ color: 0x550000 })
        );
        red.position.set(-0.48, 3.1, -0.1);
        g.add(red);

        const blue = new THREE.Mesh(
          new THREE.BoxGeometry(0.78, 0.22, 0.32),
          new THREE.MeshBasicMaterial({ color: 0x000055 })
        );
        blue.position.set(0.48, 3.1, -0.1);
        g.add(blue);

        const policeDoor = new THREE.Mesh(
          new THREE.PlaneGeometry(1.8, 0.9),
          new THREE.MeshBasicMaterial({ color: 0x111111 })
        );
        policeDoor.position.set(2.42, 1.7, -0.35);
        policeDoor.rotation.y = -Math.PI / 2;
        g.add(policeDoor);

        g.userData.redLight = red;
        g.userData.blueLight = blue;
      }

      const wheelGeo = new THREE.CylinderGeometry(0.97, 0.97, 0.75, 12);
      const wheelMat = lambert(0x111111);

      const wheelOffsets = [
        [-2.15, 0.95, 2.75],
        [ 2.15, 0.95, 2.75],
        [-2.15, 0.95,-2.75],
        [ 2.15, 0.95,-2.75]
      ];

      const wheels = [];
      for (const o of wheelOffsets) {
        const w = new THREE.Mesh(wheelGeo, wheelMat);
        w.rotation.z = Math.PI / 2;
        w.position.set(o[0], o[1], o[2]);
        g.add(w);
        wheels.push(w);
      }

      g.userData.wheels = wheels;

      if (isPlayer) {
        [playerWheelFL, playerWheelFR, playerWheelRL, playerWheelRR] = wheels;
      }

      return g;
    }

    player.add(createCarMesh(0xffffff, true, false));
    if (carTex) applyPlayerTexture();

    // Traffic lanes
    const trafficLanes = [];
    for (let i = 0; i < ROAD_POSITIONS.length; i++) {
      const r = ROAD_POSITIONS[i];
      trafficLanes.push({ axis: "x", coord: r - 7.5, dir: 1, min: -HALF + 30, max: HALF - 30 });
      trafficLanes.push({ axis: "x", coord: r + 7.5, dir: -1, min: -HALF + 30, max: HALF - 30 });
      trafficLanes.push({ axis: "z", coord: r - 7.5, dir: -1, min: -HALF + 30, max: HALF - 30 });
      trafficLanes.push({ axis: "z", coord: r + 7.5, dir: 1, min: -HALF + 30, max: HALF - 30 });
    }

    // Traffic
    const trafficCars = [];
    const trafficColors = [0xff4545,0x3e85ff,0xffffff,0x101010,0xf0c02b,0x58d36d,0xb46cff];

    function createTrafficCar() {
      const lane = trafficLanes[(Math.random() * trafficLanes.length) | 0];
      const mesh = createCarMesh(trafficColors[(Math.random()*trafficColors.length)|0], false, false);
      scene.add(mesh);
      return {
        mesh,
        lane,
        t: lane.min + Math.random() * (lane.max - lane.min),
        speed: 0.26 + Math.random() * 0.24
      };
    }

    for (let i = 0; i < 42; i++) trafficCars.push(createTrafficCar());
    trafficCountEl.textContent = trafficCars.length;

    // Police
    const policeCars = [];

    function spawnPoliceNearPlayer() {
      if (policeCars.length >= 10) return;

      const ang = Math.random() * Math.PI * 2;
      const dist = 170 + Math.random() * 100;
      let x = playerState.x + Math.cos(ang) * dist;
      let z = playerState.z + Math.sin(ang) * dist;

      let bestRX = ROAD_POSITIONS[0], bestRZ = ROAD_POSITIONS[0];
      let dxBest = 1e9, dzBest = 1e9;
      for (const r of ROAD_POSITIONS) {
        const dx = Math.abs(x - r);
        const dz = Math.abs(z - r);
        if (dx < dxBest) { dxBest = dx; bestRX = r; }
        if (dz < dzBest) { dzBest = dz; bestRZ = r; }
      }

      if (dxBest < dzBest) x = bestRX + (Math.random() < 0.5 ? -7.5 : 7.5);
      else z = bestRZ + (Math.random() < 0.5 ? -7.5 : 7.5);

      const mesh = createCarMesh(0xffffff, false, true);
      scene.add(mesh);

      policeCars.push({
        mesh,
        x, z, y: 0.45,
        yaw: 0,
        speed: 0,
        blink: 0
      });

      policeCountEl.textContent = policeCars.length;
    }

    // State
    const keys = {};
    let cameraMode = 0;
    let wanted = 0;
    let policeHits = 0;
    let lastOffenseTime = 0;
    let lastCrashTime = 0;
    let lastHitTime = 0;
    let prevNearIntersection = false;

    const playerState = {
      x: 0,
      z: 0,
      y: 0.45,
      yaw: 0,
      speed: 0,
      verticalVel: 0,
      grounded: true,
      suspensionFL: 0,
      suspensionFR: 0,
      suspensionRL: 0,
      suspensionRR: 0,
      steeringVisual: 0,
      reset() {
        this.x = 0;
        this.z = 0;
        this.y = 0.45;
        this.yaw = 0;
        this.speed = 0;
        this.verticalVel = 0;
        this.grounded = true;
        this.suspensionFL = this.suspensionFR = this.suspensionRL = this.suspensionRR = 0;
        this.steeringVisual = 0;
        wanted = 0;
        policeHits = 0;
        policeCars.forEach(p => scene.remove(p.mesh));
        policeCars.length = 0;
        wantedEl.textContent = wanted;
        hitsEl.textContent = policeHits;
        policeCountEl.textContent = policeCars.length;
        player.position.set(this.x, this.y, this.z);
        player.rotation.set(0, this.yaw, 0);
      }
    };
    playerState.reset();

    function increaseWanted(amount) {
      const prev = wanted;
      wanted = clamp(wanted + amount, 0, 10);
      wantedEl.textContent = wanted;

      const targetPolice = Math.min(2 + Math.floor(wanted / 2), 10);
      if (wanted > prev) {
        while (policeCars.length < targetPolice) spawnPoliceNearPlayer();
        showMsg("POLICE ALERT!");
      }
    }

    function handleRedLightCrime(now) {
      if (now - lastOffenseTime < 1600) return;
      lastOffenseTime = now;
      increaseWanted(1);
      showMsg("RED LIGHT!");
    }

    function handleCrashCrime(now) {
      if (now - lastCrashTime < 1200) return;
      lastCrashTime = now;
      increaseWanted(1);
      showMsg("HIT AND RUN!");
    }

    function checkPlayerVsBuildings(prevX, prevZ) {
      for (const c of colliders) {
        if (
          Math.abs(playerState.x - c.x) < c.hw + 2.2 &&
          Math.abs(playerState.z - c.z) < c.hd + 2.2
        ) {
          playerState.x = prevX;
          playerState.z = prevZ;
          playerState.speed *= -0.2;
          showMsg("CRASH!");
          return true;
        }
      }
      return false;
    }

    function updateTraffic(dt, now) {
      const nsGreen = lightState.nsGreen;

      for (const c of trafficCars) {
        const lane = c.lane;
        let mustStop = false;

        if (lane.axis === "x") {
          for (const ix of ROAD_POSITIONS) {
            const diff = ix - c.t;
            const movingToward = lane.dir > 0 ? diff > 0 && diff < 16 : diff < 0 && diff > -16;
            if (movingToward) {
              const green = !nsGreen;
              if (!green) mustStop = true;
              break;
            }
          }
        } else {
          for (const iz of ROAD_POSITIONS) {
            const diff = iz - c.t;
            const movingToward = lane.dir > 0 ? diff > 0 && diff < 16 : diff < 0 && diff > -16;
            if (movingToward) {
              const green = nsGreen;
              if (!green) mustStop = true;
              break;
            }
          }
        }

        const move = mustStop ? Math.max(c.speed * 0.12, 0.015) : c.speed;
        c.t += move * lane.dir * 60 * dt;

        if (c.t > lane.max) c.t = lane.min;
        if (c.t < lane.min) c.t = lane.max;

        if (lane.axis === "x") {
          c.mesh.position.set(c.t, 0.45, lane.coord);
          c.mesh.rotation.y = lane.dir > 0 ? Math.PI / 2 : -Math.PI / 2;
        } else {
          c.mesh.position.set(lane.coord, 0.45, c.t);
          c.mesh.rotation.y = lane.dir > 0 ? 0 : Math.PI;
        }

        const wheels = c.mesh.userData.wheels;
        for (const w of wheels) w.rotation.x -= move * 0.14;

        const dx = playerState.x - c.mesh.position.x;
        const dz = playerState.z - c.mesh.position.z;
        if (dx * dx + dz * dz < 42) {
          playerState.speed *= -0.2;
          playerState.x += dx * 0.18;
          playerState.z += dz * 0.18;
          handleCrashCrime(now);
        }
      }
    }

    function updatePolice(dt, now) {
      for (const p of policeCars) {
        const dx = playerState.x - p.x;
        const dz = playerState.z - p.z;
        const targetYaw = Math.atan2(dx, dz);

        let da = targetYaw - p.yaw;
        while (da > Math.PI) da -= Math.PI * 2;
        while (da < -Math.PI) da += Math.PI * 2;

        p.yaw += da * 0.07;

        const targetSpeed = 0.62 + wanted * 0.07;
        p.speed += (targetSpeed - p.speed) * 0.03;

        p.x += Math.sin(p.yaw) * p.speed * 60 * dt;
        p.z += Math.cos(p.yaw) * p.speed * 60 * dt;
        p.x = clamp(p.x, -HALF + 12, HALF - 12);
        p.z = clamp(p.z, -HALF + 12, HALF - 12);

        p.mesh.position.set(p.x, p.y, p.z);
        p.mesh.rotation.y = p.yaw;

        p.blink += dt * 12;
        const on = (p.blink % 1) < 0.5;
        p.mesh.userData.redLight.material.color.setHex(on ? 0xff2222 : 0x440000);
        p.mesh.userData.blueLight.material.color.setHex(on ? 0x2a6fff : 0x000044);

        const d2 = dist2(playerState.x, playerState.z, p.x, p.z);
        if (d2 < 58 && now - lastHitTime > 650) {
          lastHitTime = now;
          policeHits++;
          hitsEl.textContent = policeHits;
          playerState.speed *= -0.22;
          showMsg("POLICE HIT!");

          if (policeHits >= 20) {
            flashBusted();
            showMsg("BUSTED", 1400);
            setTimeout(() => playerState.reset(), 1000);
          }
        }
      }
    }

    function updateWantedDecay(dt) {
      if (wanted > 0) {
        const closePolice = policeCars.some(p => dist2(playerState.x, playerState.z, p.x, p.z) < 260 * 260);
        if (!closePolice) {
          updateWantedDecay.acc = (updateWantedDecay.acc || 0) + dt;
          if (updateWantedDecay.acc > 14) {
            updateWantedDecay.acc = 0;
            wanted--;
            wantedEl.textContent = wanted;

            const targetPolice = Math.min(2 + Math.floor(wanted / 2), 10);
            while (policeCars.length > targetPolice) {
              const p = policeCars.pop();
              scene.remove(p.mesh);
            }
            policeCountEl.textContent = policeCars.length;

            if (wanted === 0) showMsg("ESCAPED");
          }
        } else {
          updateWantedDecay.acc = 0;
        }
      } else {
        updateWantedDecay.acc = 0;
      }
    }

    function updateMinimap() {
      mm.clearRect(0, 0, 200, 200);

      mm.fillStyle = "#6bbf5b";
      mm.fillRect(0, 0, 200, 200);

      const scale = 200 / WORLD_SIZE;

      mm.fillStyle = "#2d2d2f";
      for (const r of ROAD_POSITIONS) {
        const y = 100 + r * scale;
        const x = 100 + r * scale;
        mm.fillRect(0, y - (ROAD_W * scale / 2), 200, ROAD_W * scale);
        mm.fillRect(x - (ROAD_W * scale / 2), 0, ROAD_W * scale, 200);
      }

      // player
      const px = 100 + playerState.x * scale;
      const pz = 100 + playerState.z * scale;
      mm.save();
      mm.translate(px, pz);
      mm.rotate(-playerState.yaw);
      mm.fillStyle = "#ffffff";
      mm.beginPath();
      mm.moveTo(0, -6);
      mm.lineTo(4, 6);
      mm.lineTo(-4, 6);
      mm.closePath();
      mm.fill();
      mm.restore();

      // police logos
      for (const p of policeCars) {
        const x = 100 + p.x * scale;
        const z = 100 + p.z * scale;
        mm.fillStyle = "#1e5fff";
        mm.beginPath();
        mm.arc(x, z, 4.5, 0, Math.PI * 2);
        mm.fill();
        mm.fillStyle = "#ffffff";
        mm.font = "bold 7px Arial";
        mm.fillText("P", x - 2.3, z + 2.4);
      }

      // traffic
      mm.fillStyle = "#ffd43a";
      for (let i = 0; i < trafficCars.length; i += 2) {
        const c = trafficCars[i];
        const x = 100 + c.mesh.position.x * scale;
        const z = 100 + c.mesh.position.z * scale;
        mm.fillRect(x - 1.5, z - 1.5, 3, 3);
      }
    }

    window.addEventListener("keydown", (e) => {
      const k = e.key.toLowerCase();
      keys[k] = true;
      if (k === "r") playerState.reset();
      if (k === "c") cameraMode = (cameraMode + 1) % 3;
    });

    window.addEventListener("keyup", (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.033);
      const now = performance.now();

      updateTrafficLights(dt);

      const forward = keys["w"] || keys["arrowup"];
      const backward = keys["s"] || keys["arrowdown"];
      const left = keys["a"] || keys["arrowleft"];
      const right = keys["d"] || keys["arrowright"];
      const handbrake = keys[" "];

      // more realistic-ish arcade driving
      const accel = playerState.grounded ? 0.043 : 0.02;
      const brake = playerState.grounded ? 0.052 : 0.028;
      const drag = playerState.grounded ? 0.988 : 0.994;
      const offRoadDrag = 0.972;

      if (forward) playerState.speed += accel;
      if (backward) playerState.speed -= brake;

      playerState.speed *= drag;
      if (handbrake) playerState.speed *= 0.962;
      playerState.speed = clamp(playerState.speed, -0.38, 1.12);

      const speedAbs = Math.abs(playerState.speed);
      const steerStrength = playerState.grounded
        ? (0.011 + Math.min(speedAbs * 0.018, 0.026))
        : 0.005;

      const grip = handbrake ? 0.70 : 1.0;

      if (left) playerState.yaw += steerStrength * (playerState.speed >= 0 ? 1 : -1) * grip;
      if (right) playerState.yaw -= steerStrength * (playerState.speed >= 0 ? 1 : -1) * grip;

      const prevX = playerState.x;
      const prevZ = playerState.z;

      playerState.x += Math.sin(playerState.yaw) * playerState.speed * 2.35;
      playerState.z += Math.cos(playerState.yaw) * playerState.speed * 2.35;

      playerState.x = clamp(playerState.x, -HALF + 14, HALF - 14);
      playerState.z = clamp(playerState.z, -HALF + 14, HALF - 14);

      if (!playerState.grounded) {
        playerState.verticalVel -= 0.025;
        playerState.y += playerState.verticalVel * 4.2;
        if (playerState.y <= 0.45) {
          playerState.y = 0.45;
          playerState.grounded = true;
          playerState.verticalVel = 0;
        }
      }

      if (!isOnRoad(playerState.x, playerState.z)) {
        playerState.speed *= offRoadDrag;
      }

      checkPlayerVsBuildings(prevX, prevZ);

      for (const j of jumps) {
        if (dist2(playerState.x, playerState.z, j.x, j.z) < 120 && playerState.grounded && playerState.speed > 0.34) {
          playerState.verticalVel = 0.42 + Math.min(playerState.speed * 0.12, 0.18);
          playerState.grounded = false;
          showMsg("JUMP!");
          break;
        }
      }

      const nearest = getNearestIntersection(playerState.x, playerState.z);
      const nearIntersection = nearest && dist2(playerState.x, playerState.z, nearest.x, nearest.z) < 20 * 20;
      const laneDir = getLaneDirAtPoint(playerState.x, playerState.z);

      if (nearIntersection && !prevNearIntersection && Math.abs(playerState.speed) > 0.62 && laneDir) {
        let isRedForPlayer = false;
        if (laneDir.axis === "z") isRedForPlayer = !lightState.nsGreen;
        if (laneDir.axis === "x") isRedForPlayer = lightState.nsGreen;
        if (isRedForPlayer) handleRedLightCrime(now);
      }
      prevNearIntersection = nearIntersection;

      updateTraffic(dt, now);
      updatePolice(dt, now);
      updateWantedDecay(dt);

      // suspension / body motion
      const suspensionTargetFront = forward ? -0.09 : 0;
      const suspensionTargetRear = backward ? -0.08 : 0;
      const sideLean = (left ? -0.08 : 0) + (right ? 0.08 : 0);

      playerState.suspensionFL += (((-playerState.speed * 0.06) + sideLean + suspensionTargetFront) - playerState.suspensionFL) * 0.12;
      playerState.suspensionFR += (((-playerState.speed * 0.06) - sideLean + suspensionTargetFront) - playerState.suspensionFR) * 0.12;
      playerState.suspensionRL += ((((playerState.speed * 0.05)) + sideLean + suspensionTargetRear) - playerState.suspensionRL) * 0.12;
      playerState.suspensionRR += ((((playerState.speed * 0.05)) - sideLean + suspensionTargetRear) - playerState.suspensionRR) * 0.12;

      player.position.set(playerState.x, playerState.y, playerState.z);
      player.rotation.y = playerState.yaw;
      player.rotation.z += (((left ? -0.08 : 0) + (right ? 0.08 : 0)) - player.rotation.z) * 0.08;
      player.rotation.x += ((playerState.grounded ? -playerState.speed * 0.055 : -0.16) - player.rotation.x) * 0.08;

      if (playerWheelFL) playerWheelFL.position.y = 0.95 + playerState.suspensionFL;
      if (playerWheelFR) playerWheelFR.position.y = 0.95 + playerState.suspensionFR;
      if (playerWheelRL) playerWheelRL.position.y = 0.95 + playerState.suspensionRL;
      if (playerWheelRR) playerWheelRR.position.y = 0.95 + playerState.suspensionRR;

      const steerVisualTarget = (left ? 0.42 : 0) + (right ? -0.42 : 0);
      playerState.steeringVisual += (steerVisualTarget - playerState.steeringVisual) * 0.16;
      if (playerWheelFL) playerWheelFL.rotation.y = playerState.steeringVisual;
      if (playerWheelFR) playerWheelFR.rotation.y = playerState.steeringVisual;

      for (const w of [playerWheelFL, playerWheelFR, playerWheelRL, playerWheelRR]) {
        if (w) w.rotation.x -= playerState.speed * 0.18;
      }

      if (cameraMode === 0) {
        const back = new THREE.Vector3(Math.sin(playerState.yaw), 0.2, Math.cos(playerState.yaw)).multiplyScalar(-24);
        const target = new THREE.Vector3(playerState.x, playerState.y + 8.5, playerState.z).add(back);
        camera.position.lerp(target, 0.09);
        camera.lookAt(playerState.x, playerState.y + 2.4, playerState.z);
      } else if (cameraMode === 1) {
        const side = new THREE.Vector3(Math.cos(playerState.yaw) * 14, 6.4, -Math.sin(playerState.yaw) * 14);
        const target = new THREE.Vector3(playerState.x, playerState.y + 2, playerState.z).add(side);
        camera.position.lerp(target, 0.09);
        camera.lookAt(playerState.x, playerState.y + 1.8, playerState.z);
      } else {
        const target = new THREE.Vector3(playerState.x, playerState.y + 40, playerState.z + 0.01);
        camera.position.lerp(target, 0.07);
        camera.lookAt(playerState.x, playerState.y, playerState.z);
      }

      speedEl.textContent = Math.round(Math.abs(playerState.speed) * 155);
      lightEl.textContent = lightState.nsGreen ? "NS green / EW red" : "EW green / NS red";

      updateMinimap();
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    setTimeout(() => {
      if (carTex && playerBody) applyPlayerTexture();
      refreshBillboards();
    }, 900);

    loading.style.display = "none";
    animate();
  </script>
</body>
